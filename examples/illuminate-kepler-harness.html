Bull (≈20%): permissive regulation, cheap capital. The cross-feeds run at full strength and Kepler compounds faster than any single-vertical competitor can respond; contribution reaches +$0.48 and the moat becomes genuinely uncatchable — but the risk is regulatory backlash provoked by that`},"S-102":{source:"The discount it closes",text:"The ~35% conglomerate discount is not a market error to be argued away; it is the market correctly pricing what it can see — six mediocre businesses and no visible connective tissue. The discount closes only when the cross-feeds become visible and measurable — when Kepler can show, cross-feed by cross-feed, that mobility's data measurably lowered energy's siting cost, that device sensors measurably sharpened fraud models, that the terms are multiplying, not adding. The strategy's financial objective is therefore not a margin target; it is making the flywheel legible — instrumenting and reporting the compounding so the market re-rates the connective tissue from zero to the asset it actually is. Contribution per interaction (−0.31) is the single headline metric of that legibility."},"S-103":{source:"The one dependency",text:"Everything above hangs on one thing, and it is the same thing the sequencing already named: the Data/AI platform (D6) must be built first and funded through its loss-making years as infrastructure, before any domain's cross-feed can flow. It is the hub; without it, the spokes never connect, the terms only add, and the entire flywheel thesis collapses into the conglomerate it was meant to escape. Every other decision in this document can slip a year; this one cannot, and it is the one the market — and an impatient board staring at a −$420m cost centre — will be most tempted to cut. Cutting it is not a cost saving. It is choosing to be a conglomerate."},"S-104":{source:"What's true, and what counts",text:`What's settled. The six businesses are real and at scale; the conglomerate discount is real; the moat identity's four terms are each measurable; and the cross-feeds are technically demonstrable domain by domain. None of that is in dispute.

What counts. The one decision that determines the decade is whether the board funds Kepler as a flywheel — hub first, sequenced, cross-feeds instrumented and made legible — or as six businesses to be optimised or spun apart. The first multiplies four terms into an uncatchable moat and inverts the discount; the second severs the wiring and confirms the mediocrity the discount already prices. The difference between them is not capital or engineering. It is whether Kepler believes its own thesis enough to build the hub before the spokes.`},"S-105":{source:"Evidence register",text:`Traces are grouped by domain so any claim walks back to its source; the domain sections carry the detailed S-1xx…S-6xx traces inline.

S-0xx — thesis & moat. The M = D×B×L×T identity, the −0.31 contribution target, the 35% conglomerate discount, the scenario distribution, the sequencing critical path. Source: strategy & the unit-economics model.

S-1xx — Mobility. Fleet density, utilization, safety, rider economics, the location-data cross-feeds. Fleet & safety systems of record.

S-2xx — Energy. Network utilization, dispatch, reliability, the transition scenario. Grid & operations.

S-3xx — Logistics. Two-sided liquidity, courier/merchant cohorts, matching, density. Marketplace analytics.

S-4xx — Payments. Rails, underwriting, fraud/compliance, interchange. Fintech & risk.

S-5xx — Devices. Product, BOM/margin, supply chain, sensor-data breadth. Hardware & supply chain.

S-6xx — Data/A`}},B0=bt.createContext(()=>{});function V0({children:e}){const[t,n]=b.useState(null),r=t?K0[t]:null,a=i=>{const s=i.target.closest("[data-cite]");s&&(i.preventDefault(),n(s.getAttribute("data-cite")))};return v.jsxs(B0.Provider,{value:n,children:[v.jsx("div",{onClick:a,children:e}),v.jsx(Yp,{open:!!t,onOpenChange:i=>!i&&n(null),children:v.jsxs(Zp,{children:[v.jsx(Jp,{className:"fixed inset-0 bg-black/40 z-50 data-[state=open]:animate-[fade_.2s]"}),v.jsxs(ef,{className:"fixed top-0 right-0 h-full w-[min(460px,94vw)] bg-paper border-l-2 border-ink z-50 flex flex-col shadow-2xl outline-none data-[state=open]:animate-[slidein_.28s_cubic-bezier(.16,1,.3,1)]",children:[v.jsxs("div",{className:"flex items-center gap-2 px-5 py-4 border-b-2 border-ink",children:[v.jsx("span",{className:"font-ft font-bold text-[.62rem] tracking-[.14em] uppercase text-ink-3",children:"Evidence"}),r&&v.jsx("span",{className:"font-mono text-[.62rem] font-bold text-ink",children:t}),v.jsx(sf,{className:"ml-auto w-7 h-7 grid place-items-center border border-rule-hi rounded text-ink-2 hover:text-ink",children:"✕"})]}),r?v.jsxs("div",{className:"overflow-y-auto p-5",children:[v.jsx("div",{className:"font-mono text-[.6rem] text-ink-3 uppercase tracking-wider mb-3",children:r.source}),v.jsx("p",{className:"text-[.92rem] leading-relaxed text-ink-2",children:r.text})]}):t?v.jsxs("div",{className:"p-5 text-[.85rem] text-ink-3",children:["No evidence entry for ",v.jsx("span",{className:"font-mono text-ink",children:t}),"."]}):null]})]})})]})}function U0({code:e}){return v.jsxs("div",{className:"code my-4",children:[v.jsxs("div",{className:"ch",children:[v.jsx("i",{style:{width:8,height:8,borderRadius:9,background:"#3a352c"}}),v.jsx("span",{className:"fn",children:e.file})]}),v.jsx("pre",{dangerouslySetInnerHTML:{__html:e.lines}})]})}function H0({table:e}){const[t,n]=b.useState([]),r=bt.useMemo(()=>e.cols.map((o,l)=>({accessorKey:String(l),header:o,cell:c=>c.getValue(),sortingFn:"alphanumeri k.y)+15,textAnchor:"middle",className:"fill-[color:var(--ink)] font-ft text-[8px] font-bold",children:e.mark.name})]}),e.unit&&v.jsx("text",{x:4,y:20,className:"fill-[color:var(--ink-3)] font-mono text-[8px]",children:e.unit})]})})}function H1({data:e}){return v.jsxs("div",{className:"my-4",children:[v.jsx("div",{className:"font-ft font-bold text-[.66rem] uppercase tracking-wider text-ink-2 mb-2",children:e.root}),v.jsx("div",{className:"grid gap-2",children:e.branches.map((t,n)=>{var a;const r=n===0;return v.jsxs("div",{className:`flex items-baseline gap-3 border-l-2 pl-3 py-1 ${r?"border-beitar":"border-rule-hi"}`,children:[v.jsx("span",{className:"font-mono text-[.7rem] text-ink-3 w-12 shrink-0",children:(a=t.prob)!=null?a:""}),v.jsx("span",{className:"text-[.86rem] text-ink font-bold shrink-0",children:t.label}),t.value&&v.jsx("span",{className:"font-mono text-[.8rem] text-ink-2",children:t.value}),t.note&&v.jsx("span",{className:"text-[.78rem] text-ink-3",children:t.note})]},n)})})]})}function km({spec:e}){const t=(()=>{switch(e.family){case"code":return v.jsx(U0,{code:e.data});case"faceted-grid":return v.jsx(H0,{table:e.data});case"network":return v.jsx(B1,{data:e.data});case"kpi-summary":return v.jsx(V1,{data:e.data});case"time-series":return v.jsx(U1,{data:e.data});case"scenario-tree":return v.jsx(H1,{data:e.data});default:return null}})();return t?v.jsx("div",{"data-component":e.family,children:t}):null}const ot={meta:{source:"Article_kepler-flywheel-decade.docx",governing_thought:"The market looks at Kepler and sees a conglomerate: six physical-world businesses — mobility, energy, logistics, payments, devices, and the data platform beneath them — stapled together under one brand, each trailing a focused specialist in its own vertical, the whole priced at a ~35% conglomerate discount to the sum of its parts.",title:"Kepler",kicker:"A ten-year strategy for the operating system of the physical world"},nodes:{GT:{id:"GT",level:1,parent:null,path:["Kepler — The Flywheel Decade"],title:"Kepler — The Flywheel Decade",body:"<p>The market looks at Kepler and sees a conglomerate: six physical-world businesses — mobility, energy, logistics, payments, devices, and the data platform beneath them — stapled together under one brand, each trailing a focused specialist in its own vertical, the whole priced at a ~35% conglomerate discount to the sum of its parts. On that reading, the obvious move is to break Kepler up: spin the six out, let each compete on its own, unlock the discount.</p><p>That reading is wrong, and this document exists to prove it wrong at the mechanism level. Kepler is not six businesses. It is one flywheel. Every physical-world interaction it touches — a ride requested, a battery charged, a parcel delivered, a payment cleared, a device pinged — produces data and network effects that no single-vertical competitor can assemble, because no single-vertical competitor touches the physical world across all six surfaces at once. That shared data-and-network moat is the actual asset. The six businesses are the organs that feed it, and the moat, in turn, lowers cost and raises trust back across all six. Break Kepler up and you don't unlock value; you destroy the only thing about it that was ever defensible.</p><p>The governing thought: Kepler is one flywheel, not six businesses, and the entire strategy is sequencing the six domains so each compounds the moat — not running them as a conglomerate. Sequence them right and the moat becomes uncatchable; run them as silos and it never forms. The decade is won or lost on sequencing, not on any single business.</p><p>The rest of this document is that claim, proven domain by domain, drilled to the mechanism level where the compounding is real or it is nothing — and then reassembled into the flywheel that is the whole point.</p>",component:{family:"network",data:{hub:{label:"Kep",sub:"the moat"},spokes:[{label:"D1",sub:"Autonomous Mobility"},{label:"D2",sub:"Energy & Charging"},{label:"D3",sub:"Logistics Marketplace"},{label:"D4",sub:"Payments & Fintech"},{label:"D5",sub:"Devices & Hardware"},{label:"D6",sub:"Data & AI Platform"}],caption:"every feed is also a return — no domain a leaf"}},children:[]},D1:{id:"D1",level:2,parent:"GT",path:["Kepler — The Flywheel Decade","Autonomous Mobility"],title:"Domain 1 — Autonomous Mobility: the density engine that feeds everything else",body:"<p>Mobility is where Kepler touches the physical world most often, and frequency is the point. In the moat identity M = D × B × L × T, this domain owns Interaction density (D) outright — the sheer count of geolocated, time-stamped, behaviourally-rich events per square kilometre per hour — and it is the only domain that manufactures D at industrial scale. Every ride is a probe: it measures a street, a curb, a queue, a payment, a rider's tolerance for a three-minute wait. At 41% of the $9.4bn top line, mobility is also the cash and data furnace that the other five draw on. The argument of this section is narrow and load-bearing: D is not a vanity metric; it is the raw feedstock that lowers cost and raises trust everywhere else, and mobility is the only domain that can move it by an order of magnitude.</p><p>The cross-feeds are the whole reason D matters. Mobility's dwell-and-idle heatmaps tell Energy (D2) where to site chargers before demand exists (trace S-118). Its origin-destination tensor is the demand prior that Logistics (D3) routes couriers against (S-112). Its device-fingerprint-plus-trajectory stream is the strongest single fraud signal Payments (D4) consumes (S-116). Its vehicle sensors are the highest-volume input to Devices (D5) telemetry and to every model in Data/AI (D6) (S-121). Read alone, mobility is a good-not-great robotaxi business trailing a focused specialist. Read as the D-engine of a flywheel, it is the domain that makes the other five cheaper to run than any standalone competitor can achieve. This section develops that claim through four drivers, each mechanism chaining into the next.</p>",finding:"What's true. On its own numbers, Kepler mobility is a strong-but-not-singular robotaxi operation. It runs a dense, safe, well-instrumented fleet; utilization in saturated zones clears 70%; miles-per-intervention improved",children:["D1.d1","D1.d2","D1.d3","D1.d4"]},"D1.d1":{id:"D1.d1",level:3,parent:"D1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The fleet and the density engine"],title:"Driver 1 — The fleet and the density engine",body:'<p>Density is not bought; it is compounded <button class="cite" data-cite="S-008">S-008</button>. The fleet is the physical instrument that converts capital into interactions, and the discipline is to concentrate that instrument until the data it produces crosses a usefulness threshold — then hold it there while demand catches up <button class="cite" data-cite="S-008">S-008</button>. This driver owns <strong>D</strong>, the data term of the moat identity M = D × B × L × T: inside an already-dense zone every additional interaction sharpens the routing and pricing models rather than merely adding revenue, which is why concentration, not coverage, is the governing rule and why the two mechanisms below both bend toward holding a saturated core rather than spreading a thin blanket <button class="cite" data-cite="S-009">S-009</button>.</p>',children:["D1.d1.m1","D1.d1.m2"]},"D1.d1.m1":{id:"D1.d1.m1",level:4,parent:"D1.d1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The fleet and the density engine","The density-first deployment rule"],title:"The density-first deployment rule",body:`<p>Kepler does not spread vehicles to maximise city coverage; it floods zones until interaction density per km² per hour crosses the threshold where the routing and pricing models stop guessing <button class="cite" data-cite="S-009">S-009</button>. <strong>Below roughly 40 interactions/km²/hr the models are extrapolating; above it they are interpolating</strong>, and every downstream prediction — ETA, surge, charger dwell — sharpens. The mechanism moves D directly: rather than 300 vehicles thin across a metro, Kepler runs 1,100 inside three contiguous zones <button class="cite" data-cite="S-009">S-009</button>. The trade-off is brutal and deliberate — visible under-service at the metro edge, and a press narrative of "Kepler abandoned the suburbs," accepted because a dense core produces data that a thin blanket never will <button class="cite" data-cite="S-101">S-101</button>.</p><p>The faceted map renders the rule as a metro canvas of named zones, each labelled with active vehicles and utilization (revenue-minutes ÷ available-minutes). Its decisive contrast is <strong>Marina Core at 71% against Noord Fringe at 39%</strong>: the same vehicle earns and learns nearly twice as much inside the saturated zone <button class="cite" data-cite="S-102">S-102</button>. Noord Fringe is the edge-case the rule tolerates — a starving polygon kept deliberately thin so capital flows to Marina Core <button class="cite" data-cite="S-102">S-102</button>. Saturated zones are outlined solid; sub-threshold zones are hatched, a standing to-do list of where density has not yet been bought. The Reforma Corridor sits between the two states, ramping toward the 40-interaction floor: it is where the rule is being executed rather than defended, and its trajectory over the next three quarters is the leading indicator of whether the density-first thesis generalises beyond Singapore and Amsterdam's founding geometry <button class="cite" data-cite="S-009">S-009</button>.</p>`,component:{family:"faceted-grid",data:{cols:["Zone (city)","Active AVs","Utilization","Interactions/km²/hr","Status"],rows:[["Marina Core (Singapore)","420","71%","63","Saturated — data-complete"],["Jurong Spine (Singapore)","260","58%","44","At threshold"],["Amstel Ring (Amsterdam)","310","66%","51","Saturated — data-complete"],["Noord Fringe (Amsterdam)","140","39%","22","Sub-threshold — starving"],["Jumeirah Belt (Dubai)","380","68%","55","Saturated — data-complete"],["Reforma Corridor (Mexico City)","290","52%","34","Below threshold — ramping"]],negCols:[]}},children:[]},"D1.d1.m2":{id:"D1.d1.m2",level:4,parent:"D1.d1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The fleet and the density engine","Holding the floor with a utilization time-series"],title:"Holding the floor with a utilization time-series",body:`<p>Concentration only compounds if utilization stays high enough that the fleet is interacting rather than idling — an idle AV produces no D and burns the depreciation that Driver 4 quantifies <button class="cite" data-cite="S-010">S-010</button>. Kepler manages the fleet against a <strong>utilization floor</strong>, dispatching repositioning moves and dynamic pricing — fed by D4's cash-free rails — whenever a zone threatens to slip beneath it. The mechanism moves D by protecting the denominator of interactions-per-vehicle; the number it moves is weekday utilization, <strong>held above the 60% floor in saturated zones</strong> <button class="cite" data-cite="S-010">S-010</button>.</p><p>The utilization time-series for Marina Core plots a 24-hour curve, midnight to midnight, against a dashed 60% floor line. Two peaks — 07:30 and 18:15 — clear 80%, while the 14:00 midday trough kisses the floor and triggers repositioning and a fare cut <button class="cite" data-cite="S-103">S-103</button>. The edge-case is the trough that breaks the floor: a rain-driven demand collapse on a Tuesday dropped Reforma Corridor to 41% for two hours, the signal that a zone is over-vehicled and capital should rotate out <button class="cite" data-cite="S-104">S-104</button>. The chain to Driver 2 is direct — a fleet held at the density floor generates enough incident-free exposure that safety becomes statistically legible, which is the only way to earn the trust the next driver depends on <button class="cite" data-cite="S-010">S-010</button>.</p>`,component:{family:"code",data:{file:"Holding the floor with a utilization time-seri",lines:'Util %  Marina Core — weekday utilization vs <span <span class="k">class</span>="nu">60</span>% floor <span <span class="k">class</span>="nu">90</span> |                    ╭─╮              ╭──╮ <span <span class="k">class</span>="nu">80</span> |          ╭─╮      ╱   ╲           ╱     ╲ <span <span class="k">class</span>="nu">70</span> |    ╭────╯   ╲────╯     ╲────╮   ╱        ╲ <span <span class="k">class</span>="nu">60</span> |╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╌╲─╱╌╌╌╌╌╌╌╌╌╌╌╲╌╌  ← floor <span <span class="k">class</span>="nu">50</span> |  ╱                          ╰╯             ╲ <span <span class="k">class</span>="nu">40</span> |─╯                                           ╲    +--------------------------------------------------     <span <span class="k">class</span>="nu">00</span>   <span <span class="k">class</span>="nu">03</span>    <span <span class="k">class</span>="nu">06</span>    <span <span class="k">class</span>="nu">09</span>    <span <span class="k">class</span>="nu">12</span>    <span <span class="k">class</span>="nu">15</span>    <span <span class="k">class</span>="nu">18</span>    <span <span class="k">class</span>="nu">21</span>   <span <span class="k">class</span>="nu">24</span>          AM peak↑          midday dip↓   PM peak↑'}},children:[]},"D1.d2":{id:"D1.d2",level:3,parent:"D1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","Safety and the trust it earns"],title:"Driver 2 — Safety and the trust it earns",body:`<p>Density without safety is a liability that regulators close overnight. This driver owns mobility's single contribution to <strong>Trust (T)</strong> — the one moat term besides Density (D) that mobility meaningfully moves — and its logic is narrow but load-bearing: accumulated safe miles are not an asset until they become a <strong>disclosed, auditable record</strong> that regulators and riders both price in <button class="cite" data-cite="S-011">S-011</button>. Miles that stay inside Kepler's own warehouse move nothing; miles turned into an inspectable safety record before the next zone permit are what actually lift T. The two mechanisms below are the currency and the ledger — the metric that proves the fleet is getting safer, and the timeline that lets an outside party verify it.</p>`,children:["D1.d2.m1","D1.d2.m2"]},"D1.d2.m1":{id:"D1.d2.m1",level:4,parent:"D1.d2",path:["Kepler — The Flywheel Decade","Autonomous Mobility","Safety and the trust it earns","Miles-per-intervention as the trust currency"],title:"Miles-per-intervention as the trust currency",body:`<p>The operating metric is <strong>miles between safety-critical disengagements</strong> — the distance the fleet covers before a remote operator or safety driver has to take control to avoid harm <button class="cite" data-cite="S-012">S-012</button>. Density compounds this metric in a way a single-vertical rival cannot copy: saturated zones run so many miles over the same road geometry that the model sees each rare edge-case — an occluded pedestrian stepping from behind a bus, a cyclist jaywalking against the light — hundreds of times rather than once, so the long tail is learned rather than survived. The mechanism moves T by pushing miles-per-intervention up an order of magnitude, and it is fed by D6's perception models, which are themselves trained on the density D1 produces <button class="cite" data-cite="S-105">S-105</button> — the cross-feed that makes the gain circular rather than one-off.</p><p>The evidence is superlinear, and the superlinearity is the whole claim: miles-per-intervention rose <strong>11.6× across four quarters while fleet miles merely tripled</strong> <button class="cite" data-cite="S-106">S-106</button>. If safety scaled linearly with exposure the two curves would track each other; instead the ratio pulls away, and that widening gap is the density dividend — the same edge-case seen enough times to be modelled instead of merely endured. The trade-off is real and is managed, not ignored: chasing the metric too hard breeds over-cautious "freezing" behaviour that tanks the rider experience of Driver 3, so the safety and experience teams are held to one shared objective function, not two <button class="cite" data-cite="S-012">S-012</button>.</p>`,component:{family:"faceted-grid",data:{cols:["Quarter","Miles/critical intervention","Fleet miles (m)","Critical incidents","Zone"],rows:[["Q1","18,400","22","3","Marina Core"],["Q2","41,200","31","2","Marina Core"],["Q3","96,500","44","1","Marina Core"],["Q4","214,000","58","1","Marina Core"]],negCols:[]}},children:[]},"D1.d2.m2":{id:"D1.d2.m2",level:4,parent:"D1.d2",path:["Kepler — The Flywheel Decade","Autonomous Mobility","Safety and the trust it earns","The incident timeline as an auditable record"],title:"The incident timeline as an auditable record",body:`<p>Trust is not the average day; it is <strong>how the worst days are handled and disclosed</strong>. Kepler maintains a public safety-incident timeline — every safety-critical event logged, root-caused, and tied to the exact model or hardware change that closed it <button class="cite" data-cite="S-013">S-013</button>. The mechanism moves T by converting opaque risk into an audit trail a regulator can inspect before granting the next zone permit <button class="cite" data-cite="S-107">S-107</button>: disclosure itself becomes the currency that buys licence-to-operate. The trade-off is radical transparency — publishing incidents competitors keep quiet, a genuine short-term reputational cost paid deliberately in exchange for long-term standing with the bodies that hand out permits.</p><p>The Q4 event is the instructive edge-case. Heavy rain attenuated lidar; rather than proceeding blind, the vehicle correctly executed a <strong>minimum-risk pullover</strong>, and the fix — radar-weighted sensor fusion — came straight from Devices (D5) hardware co-design <button class="cite" data-cite="S-109">S-109</button>. That is the flywheel made visible inside a single incident: a hardware cross-feed closing a mobility safety gap, then logged in the open where a regulator can trace cause to remedy. The chain to Driver 3 follows directly — a fleet that is both dense and demonstrably safe can finally be sold as an experience, because trust is the precondition a rider needs before any of the app's promises mean anything <button class="cite" data-cite="S-013">S-013</button>.</p>`,component:{family:"code",data:{file:"The incident timeline as an auditable record",lines:'SAFETY-INCIDENT TIMELINE — Marina Core + Amstel Ring──────────────────────────────────────────────────────────Q1  ●── Occluded pedestrian, near-miss (no contact)        Root cause: late detection behind parked van        Fix: perception model v4.<span <span class="k">class</span>="nu">1</span>, occlusion prior      [S-<span <span class="k">class</span>="nu">108</span>]Q2  ●── Low-speed contact w/ cyclist, no injury        Root cause: cyclist against-light, unmodeled path        Fix: intent model + geofenced slow-zoneQ3  ○── Hard brake cluster (comfort, not safety)        Root cause: over-cautious freeze at tram crossing        Fix: tuned caution threshold (see Driver <span <span class="k">class</span>="nu">3</span> tension)Q4  ●── Sensor-occlusion (heavy rain), safe pullover        Root cause: lidar attenuation; SAFE degradation        Fix: radar-weighted fusion <span class="k">in</span> rain (Devices D5)   [S-<span <span class="k">class</span>="nu">109</span>]──────────────────────────────────────────────────────────● safety-critical   ○ comfort-only'}},children:[]},"D1.d3":{id:"D1.d3",level:3,parent:"D1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The rider experience"],title:"Driver 3 — The rider experience",body:`<p>Demand density (D) and trust (T) are supply-side terms; they convert to revenue only through a rider who chooses Kepler again. This driver is where <strong>interaction density becomes interaction loyalty</strong> — where the density flywheel either self-reinforces (more riders raise D, which sharpens predictions, which improves the experience, which draws more riders) or stalls out <button class="cite" data-cite="S-014">S-014</button>. Mobility's job here is narrow and measurable: lift D by raising ride frequency per rider, and the lever is a rider app that turns model precision into felt reliability <button class="cite" data-cite="S-014">S-014</button>.</p>`,children:["D1.d3.m1","D1.d3.m2"]},"D1.d3.m1":{id:"D1.d3.m1",level:4,parent:"D1.d3",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The rider experience","Precision ETAs as the retention engine"],title:"Precision ETAs as the retention engine",body:`<p>The single experience variable that most moves rebooking is not speed but <strong>ETA accuracy</strong> <button class="cite" data-cite="S-015">S-015</button>. A rider forgives a four-minute wait promised as four minutes; they abandon a three-minute wait promised as one — the felt injury is the broken promise, not the delay. Density feeds this directly: saturated zones let the ETA model interpolate from dense recent history rather than extrapolate into thin data, which cuts mean absolute ETA error <button class="cite" data-cite="S-015">S-015</button>. That is how the mechanism moves D — by lifting rides-per-active-rider, since frequency is itself density — and it is fed by D6's demand models and the origin-destination tensor mobility itself generates <button class="cite" data-cite="S-110">S-110</button>.</p><p>The trade-off is priced, not wished away: guaranteeing tight ETAs sometimes means pre-positioning idle vehicles, which nicks the utilization floor of Driver 1 — a managed tension <button class="cite" data-cite="S-015">S-015</button>.</p><p>The rider app makes the copy do three jobs at once:</p><ul><li>"1,204,000 rides in this zone" sells density as safety-through-familiarity, cashing Driver 2's trust into legible form.</li><li>"Kepler Pay · balance auto-charged" closes the Payments (D4) loop that lets the ride run cash-free <button class="cite" data-cite="S-111">S-111</button>.</li><li>"verified safe" cashes the Driver 2 safety record at the exact point of decision.</li></ul><p>The edge case is the honest one: when the pod is not pre-positioned and the true ETA is nine minutes, the app says nine — because one broken promise costs more D than one lost ride <button class="cite" data-cite="S-015">S-015</button>.</p>`,component:{family:"code",data:{file:"Precision ETAs as the retention engine",lines:'┌───────────────────────────────────────────┐│  KEPLER · now                               ││  Your Kepler is <span <span class="k">class</span>="nu">2</span> min away 🚗               ││  Silver pod K-<span <span class="k">class</span>="nu">4471</span> · Marina Blvd pickup.    ││  We moved it closer — tap to track live.    │└───────────────────────────────────────────┘'}},children:[]},"D1.d3.m2":{id:"D1.d3.m2",level:4,parent:"D1.d3",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The rider experience","The origin-destination tensor as the shared demand prior"],title:"The origin-destination tensor as the shared demand prior",body:`<p>Every completed ride writes one cell into an <strong>origin-destination-by-time tensor</strong> — the densest demand map anyone in these cities holds <button class="cite" data-cite="S-016">S-016</button>. The mechanism moves D by making the next rider's experience better: the tensor is the prior every ETA and surge decision reads from, so each ride sharpens the model that serves the ride after it <button class="cite" data-cite="S-016">S-016</button>.</p><p>Its cross-feeds are the flywheel's spine. The same tensor is the demand prior Logistics (D3) routes its couriers against, and the dwell-pattern input Energy (D2) sites its chargers from <button class="cite" data-cite="S-112">S-112</button> — one shared warehouse feeding three domains rather than three domains hoarding three warehouses.</p><p>The trade-off is privacy exposure: the tensor is re-identification-sensitive, so it is aggregated and made differentially private before it crosses the mobility boundary — a deliberate loss of resolution accepted to protect trust <button class="cite" data-cite="S-016">S-016</button>. The chain forward to Driver 4: an experience this reliable is only defensible if the machine underneath earns money per ride, which is where unit economics decide whether density is an asset or a subsidy <button class="cite" data-cite="S-016">S-016</button>.</p>`,children:[]},"D1.d4":{id:"D1.d4",level:3,parent:"D1",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The vehicle and unit economics"],title:"Driver 4 — The vehicle and unit economics",body:`<p>Density that loses money is a countdown, not a moat. This driver asks a single question — is each incremental interaction accretive? — and it answers with the vehicle itself. The sensor stack that makes autonomy possible is also the cost line that decides the flywheel's terminal contribution, so <strong>mobility moves D only insofar as the per-ride economics let Kepler hold the density rather than retreat from it</strong> <button class="cite" data-cite="S-017">S-017</button>. Every mechanism below is that question resolved into hardware and into the number the flywheel is chartered to move.</p>`,children:["D1.d4.m1","D1.d4.m2"]},"D1.d4.m1":{id:"D1.d4.m1",level:4,parent:"D1.d4",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The vehicle and unit economics","The teardown — sensor cost as the swing variable"],title:"The teardown — sensor cost as the swing variable",body:`<p>The AV is a rolling sensor platform, and its bill of materials is the largest single lever on contribution per interaction — the swing variable that decides whether density is a moat or a countdown <button class="cite" data-cite="S-018">S-018</button>. The teardown is not a parts list; it is the cost thesis exploded outward from the chassis, and it maps one-to-one to the safety timeline. The Q4 rain incident's fix — radar-weighted fusion — is precisely why the 4D imaging radar count is five, not three <button class="cite" data-cite="S-113">S-113</button>. Reliability, in other words, is priced into the BOM.</p><p>Every one of these sensors is co-designed with Devices (D5), and their raw streams are the proprietary telemetry that widens Data breadth (B) for D6's models. Mobility manufactures D, but the vehicle is the exact point where it hands B to the platform — the sensor is simultaneously a cost line and a data faucet <button class="cite" data-cite="S-114">S-114</button>.</p><p>The BOM makes the swing visible in one view. <strong>Lidar is 61% of the sensor bill and the entire cost thesis</strong>: the solid-state roadmap that roughly halves the stack to ~$6,900 is what flips per-ride contribution positive at current density <button class="cite" data-cite="S-115">S-115</button>. The trade-off is timing — deploy density now on expensive lidar and eat negative contribution, or wait for cheap lidar and cede the density lead.</p><p>Kepler deploys now, because D compounds and cost is a schedule. A density lead surrendered to save eighteen months of lidar depreciation is a lead a rival, having filled the OD tensor first, may never return. Cost curves bend on a roadmap that engineering controls; density leads, once lost, must be re-bought against an incumbent's better models — an asymmetry that makes the expensive-lidar years a defensible investment rather than a subsidy to be apologised for <button class="cite" data-cite="S-115">S-115</button>.</p>`,component:{family:"code",data:{file:"The teardown — sensor cost as the swing variab",lines:'        KEPLER POD — EXPLODED SENSOR STACK                    ┌─────────┐        roof ▸      │ <span <span class="k">class</span>="nu">2</span>× spinning LIDAR (<span <span class="k">class</span>="nu">128</span>-beam) │                    └─────────┘     A-pillar ▸  ◐ <span <span class="k">class</span>="nu">6</span>× surround CAMERA (8MP)      grille  ▸  ▭ <span <span class="k">class</span>="nu">5</span>× imaging RADAR (4D)     bumper   ▸  ▬ <span <span class="k">class</span>="nu">12</span>× ultrasonic PROXIMITY      cabin   ▸  ▣ INERTIAL nav unit (IMU/GNSS)      trunk   ▸  ▦ COMPUTE module (autonomy SoC)      wheels  ▸  ⊙ wheel-odometry ENCODERS'}},children:[]},"D1.d4.m2":{id:"D1.d4.m2",level:4,parent:"D1.d4",path:["Kepler — The Flywheel Decade","Autonomous Mobility","The vehicle and unit economics","Contribution per interaction — the flywheel's scoreboard"],title:"Contribution per interaction — the flywheel's scoreboard",body:`<p>The number that ties this domain to the bible's central promise is blended contribution per interaction, which the flywheel is chartered to lift from −0.31 over ten years <button class="cite" data-cite="S-019">S-019</button>. Mobility drives its share of that swing through two chained effects. First, density raises utilization (Driver 1), which amortises the vehicle across more paid minutes. Second, the sensor stream widens B (this driver), which sharpens the fraud, routing, and siting models that lower cost across D2, D3, and D4.</p><p>The distinction that matters: the mechanism moves D's value, not its count — the same interaction is worth more once four other domains monetise it. The cross-feed made concrete: <strong>mobility's trajectory-plus-device-fingerprint stream is the strongest single input to Payments (D4) fraud scoring</strong>, and each fraud dollar D4 saves is booked partly against the ride that generated the signal <button class="cite" data-cite="S-116">S-116</button>. A ride, priced once, is paid for many times across the flywheel.</p><p>The edge case sharpens the logic. The loss-leader ride — a deliberately under-priced trip in a ramping zone, the Reforma Corridor — carries negative contribution on its own line, but its data closes a coverage gap in the OD tensor. It is an investment in D justified only by the flywheel, never by the ride's own P&amp;L <button class="cite" data-cite="S-117">S-117</button>. Judged as a standalone fare it is a mistake; judged as a moat input it is the cheapest breadth Kepler can buy.</p>`,children:[]},D2:{id:"D2",level:2,parent:"GT",path:["Kepler — The Flywheel Decade","Energy & Charging"],title:"Domain 2 — Energy & Charging: the cost floor and the reliability that earns trust",body:"<p>Energy is the domain that almost nobody underwrites correctly, because on a standalone P&amp;L it looks like the worst business we own: capital-heavy, thin-margined, exposed to a commodity we do not control. Read against the moat identity, though, it is the domain that quietly sets the floor under everything else. Of the four moat terms — M = D × B × L × T — Energy &amp; Charging moves exactly two, and it moves them in a way no other domain can. It compresses the marginal cost of every electron-consuming interaction in the flywheel, and it manufactures Trust (T) the only way trust in physical infrastructure is ever actually manufactured: by being reliable ten thousand times in a row where a competitor is reliable nine thousand nine hundred. It does not touch interaction density (D — that is D1's job), it feeds but does not own data breadth (B — that is D5/D6), and it is agnostic to network liquidity (L — that is D3). Its two levers are cost and T, and the entire investment case for the domain is that these two levers are not local. A charge is not the product. The product is a lower cost floor and a higher trust ceiling that the other five domains draw on for free.</p><p>The cross-feeds are the reason the domain exists inside Kepler rather than as a spun-out charge-point operator trading at a utility multiple. Three couplings carry most of the weight. First, Energy lowers the marginal cost of Mobility (D1) and Logistics (D3) — the same electrons that move an autonomous vehicle move a courier's e-scooter, and owning generation-to-socket economics means we buy those electrons once, at wholesale-plus, instead of twice at retail. Second, siting is fed by Mobility's location data (D1 → D2) — we do not guess where to build chargers; the densest ride and dwell-time data in 42 cities tells us where demand will be eighteen months before a standalone operator can see it. Third, and most strategically, reliability feeds T, and T is the term Payments (D4) is built on — a customer who trusts that the charger works is a customer who trusts the app that dispatched them to it, and eventually the wallet inside that app. Trust is not partitioned by domain in the user's head. We earn it at the socket and spend it at the checkout. This section develops four drivers, each mechanism chaining into the next, and shows where the cost floor and the trust ceiling actually come from.</p>",finding:"What's true. Energy & Charging is, on its own books, the least attractive standalone business in the portfolio: capital-intensive, exposed to a commodity it cannot control, and margin-thin even in its good branches (prob",children:["D2.d1","D2.d2","D2.d3","D2.d4"]},"D2.d1":{id:"D2.d1",level:3,parent:"D2",path:["Kepler — The Flywheel Decade","Energy & Charging","The charging network as an asset"],title:"Driver 1 — The charging network as an asset",body:`<p>The first question in Energy &amp; Charging is not how many chargers Kepler owns but what the estate actually is: <strong>6,180 charging sites across the 42 cities</strong>, carried on the books as either a cost sink or a compounding asset <button class="cite" data-cite="S-022">S-022</button>. That is not an accounting choice — it turns entirely on where the sites sit, and the placement is precisely where the first cross-domain coupling into the flywheel does its work. The two mechanisms below are that coupling, drilled: siting fed by Mobility's data, then the power economics that a well-sited estate unlocks.</p>`,children:["D2.d1.m1","D2.d1.m2"]},"D2.d1.m1":{id:"D2.d1.m1",level:4,parent:"D2.d1",path:["Kepler — The Flywheel Decade","Energy & Charging","The charging network as an asset","Siting fed by Mobility's location data (D1 → D2)"],title:"Mechanism 1.1 — Siting fed by Mobility's location data (D1 → D2)",body:`<p>A standalone charge-point operator has one way to decide where capacity goes: it sites against traffic counts and grid-connection availability. That signal is <strong>public, laggy, and available to every competitor at the same moment</strong> — it tells you where demand looked busy last year, not where it will be. Kepler sites against a signal no competitor holds: D1's proprietary dwell-and-dispatch map — where autonomous vehicles actually idle between fares, where riders actually originate, and where the fleet's state-of-charge actually crosses the reorder threshold <button class="cite" data-cite="S-023">S-023</button>. This is the flywheel's first turn inside the energy domain. Because D1 generates the densest location-and-behaviour data in the network, Kepler can place a fast-charger on the corner where the fleet will need it in 2027, not the corner that looked busy in 2024 <button class="cite" data-cite="S-201">S-201</button>.</p><p>The payoff is measured, not asserted. In the <strong>eleven cities where siting has been driven by D1 telemetry rather than public traffic data, first-year utilization ran 31% higher</strong> than in the legacy-sited estate — the single largest driver of site-level payback in the portfolio <button class="cite" data-cite="S-201">S-201</button>. The mechanism matters because utilization is the numerator of every economic in this domain; a mis-sited charger is not a small loss, it is a stranded asset earning grid-connection charges for a decade with nothing on the other side of the ledger.</p><p>The estate itself, rendered as sites × power class × utilization by city, shows why the feed is never generic. In <strong>Jakarta and Ho Chi Minh City the load is dominated by D3's courier fleet on AC chargers</strong>; in <strong>Dubai it is D1's autonomous fleet on DC-fast</strong> <button class="cite" data-cite="S-201">S-201</button>. The same physical socket serves different domains in different cities — and that is exactly the point. A socket utilised <strong>63% at peak across the network is a socket that two internal customers are paying to keep warm</strong>, a dual-demand profile no single-purpose operator can replicate <button class="cite" data-cite="S-202">S-202</button>. Siting quality then chains directly into the next mechanism, because a well-sited, dual-fed estate is what makes ownership of the power economics worth having.</p>`,component:{family:"faceted-grid",data:{cols:["City","Sites","DC-fast (≥150kW)","AC (≤22kW)","Peak util.","Off-peak util.","Primary demand feed"],rows:[["Singapore","412","188","224","74%","29%","D1 fleet + D3 couriers"],["Amsterdam","356","141","215","68%","24%","D1 fleet + retail"],["Jakarta","388","96","292","71%","33%","D3 couriers (dominant)"],["Ho Chi Minh City","301","74","227","66%","31%","D3 couriers"],["Dubai","214","132","82","59%","19%","D1 fleet (dominant)"],["Warsaw","176","61","115","52%","21%","Retail + D1"],["Network (42 cities)","6,180","2,214","3,966","63%","26%","mixed"]],negCols:[0]}},children:[]},"D2.d1.m2":{id:"D2.d1.m2",level:4,parent:"D2.d1",path:["Kepler — The Flywheel Decade","Energy & Charging","The charging network as an asset","Vertical integration of the power economics"],title:"Mechanism 1.2 — Vertical integration of the power economics",body:'<p>A well-sited, dual-fed estate is worth owning up the stack. Because Kepler can forecast aggregate load from the same fleet data behind Mechanism 1.1, it can contract power as an <strong>industrial buyer</strong> — long-dated PPAs, wholesale-market participation, on-site storage — rather than paying retail tariffs at each individual socket <button class="cite" data-cite="S-024">S-024</button>. The result is a hard number: <strong>blended landed cost of energy across the network is $0.081/kWh against a retail benchmark of $0.163/kWh in the same metros — a 50.3% wholesale-plus discount</strong> that is the raw material of the cost floor <button class="cite" data-cite="S-203">S-203</button>.</p><p>This is the mechanism that converts "we own chargers" into "we own the marginal cost of movement." It is the hinge for the entire domain, because that <strong>$0.082/kWh gap is what gets handed down to D1 and D3</strong> — the mobility and logistics fleets that draw on the estate — turning an energy-domain cost advantage into a network-wide one <button class="cite" data-cite="S-024">S-024</button>.</p>',children:[]},"D2.d2":{id:"D2.d2",level:3,parent:"D2",path:["Kepler — The Flywheel Decade","Energy & Charging","Load, demand & dispatch"],title:"Driver 2 — Load, demand & dispatch",body:`<p>Owning cheap electrons is necessary but not sufficient. The first driver secured a low <strong>average</strong> cost of power; it does nothing for the cost that actually shows up in the unit economics — the <strong>marginal</strong> cost at the instant a vehicle plugs in, a courier tops up, or a retail customer draws a session <button class="cite" data-cite="S-025">S-025</button>. The second driver is the operational engine that closes that gap: the machinery that decides <strong>when to buy, when to charge, and what to price</strong>, so a cheap average landed cost becomes a cheap marginal cost at the moment of each interaction <button class="cite" data-cite="S-025">S-025</button>. This is where the domain's distinctive formula-and-code palette lives — the load-reading, price-setting, dispatch-solving logic that the two mechanisms below make concrete.</p>`,children:["D2.d2.m1","D2.d2.m2"]},"D2.d2.m1":{id:"D2.d2.m1",level:4,parent:"D2.d2",path:["Kepler — The Flywheel Decade","Energy & Charging","Load, demand & dispatch","Reading the load curve"],title:"Mechanism 2.1 — Reading the load curve",body:`<p>Demand is not flat, and <strong>the shape of the curve is the whole game</strong> <button class="cite" data-cite="S-026">S-026</button>. Two patterns dominate, and both are read off the network-average kW drawn, normalised to peak = 100.</p><p>The daily curve has two peaks. A sharp morning ramp runs 06:00–09:00, driven by fleet pre-positioning plus commuter charging. A taller, longer evening peak runs 17:00–21:00, stacking fleet recharge, courier surge, and retail on top of one another. The trough sits at 00:00–05:00 — the hours when landed cost is lowest and demand is thinnest at the same time <button class="cite" data-cite="S-026">S-026</button>. The economic opportunity is precisely <strong>the gap between the two</strong>: expensive power meets peak demand in the evening, cheap power meets no demand overnight.</p><p>The seasonal curve, indexed to Jan = 100, has two ridges that make the problem worse. A cooling-driven summer peak (Jun–Aug) lands in the tropical metros, where grid prices spike exactly when air-conditioning load does. A Q4 logistics ridge is driven by D3's delivery surge <button class="cite" data-cite="S-204">S-204</button>. Neither ridge coincides with a cheap-power window — which is the entire reason <strong>dispatch, not just procurement, is where margin is made or lost</strong>. Reading the curve chains directly into acting on it <button class="cite" data-cite="S-026">S-026</button>.</p>`,component:{family:"code",data:{file:"Reading the load curve",lines:'Load100 |                          ██ ██ <span <span class="k">class</span>="nu">90</span> |                    ██  ██ ██ ██ ██ <span <span class="k">class</span>="nu">75</span> |          ██        ██  ██ ██ ██ ██        ██ ██ <span <span class="k">class</span>="nu">60</span> |    ██ ██ ██ ██     ██  ██ ██ ██ ██     ██ ██ ██ ██ <span <span class="k">class</span>="nu">45</span> | ██ ██ ██ ██ ██  ██ ██  ██ ██ ██ ██  ██ ██ ██ ██ ██ ██ <span <span class="k">class</span>="nu">30</span> | ██ ██ ██ ██ ██  ██ ██  ██ ██ ██ ██  ██ ██ ██ ██ ██ ██    +----------------------------------------------------------      <span <span class="k">class</span>="nu">00</span>  <span <span class="k">class</span>="nu">03</span>  <span <span class="k">class</span>="nu">06</span>   <span <span class="k">class</span>="nu">08</span>  <span <span class="k">class</span>="nu">09</span>   <span <span class="k">class</span>="nu">17</span> <span <span class="k">class</span>="nu">18</span> <span <span class="k">class</span>="nu">19</span> <span <span class="k">class</span>="nu">20</span>   <span <span class="k">class</span>="nu">22</span>  <span <span class="k">class</span>="nu">23</span>   (hour)              morning peak      evening peak'}},children:[]},"D2.d2.m2":{id:"D2.d2.m2",level:4,parent:"D2.d2",path:["Kepler — The Flywheel Decade","Energy & Charging","Load, demand & dispatch","Dynamic pricing and dispatch optimisation"],title:"Mechanism 2.2 — Dynamic pricing and dispatch optimisation",body:'<p>Given the curve, the engine does two coupled things off <strong>one margin object</strong>: it prices demand to flatten the peaks, and it dispatches charging and stored energy into the troughs <button class="cite" data-cite="S-027">S-027</button>.</p><p>The pricing side sets a per-session price as a base landed cost plus a <strong>congestion term</strong> that rises with local utilisation and a <strong>scarcity term</strong> that rises with the live grid price — then floors the result to protect customer trust and caps it to protect trust the other way. In the formula, util(s,t) ∈ [0,1] is site utilisation, grid(t) is the live wholesale price, and β and γ are tuned per city <button class="cite" data-cite="S-027">S-027</button>. The dispatch side solves, over a rolling 24-hour horizon, when to draw from storage versus the grid to minimise landed cost subject to meeting the forecast load <button class="cite" data-cite="S-027">S-027</button>.</p><p>The engine pays. Live, peak-to-trough load has flattened by <strong>18 points of the normalised index</strong> versus a flat-tariff baseline, and storage arbitrage captured <strong>$0.019/kWh of additional margin</strong> on the 22% of volume it touches <button class="cite" data-cite="S-205">S-205</button>. Crucially, the same engine is what lets Kepler hand D1 and D3 a stable, low internal transfer price: having flattened its own exposure, it can offer the fleet a fixed <strong>$0.094/kWh</strong> and D3 <strong>$0.101/kWh</strong> — both far below the <strong>$0.163 retail benchmark</strong>, and that gap is the marginal-cost reduction the flywheel promised <button class="cite" data-cite="S-206">S-206</button>. Dispatch stability chains into the third driver: a network that is economically stable is the precondition for being reliable, and <strong>reliability is where trust is minted</strong> <button class="cite" data-cite="S-027">S-027</button>.</p>',component:{family:"code",data:{file:"Dynamic pricing and dispatch optimisation",lines:'price(s,t) = clip(    c_land(t) · (<span <span class="k">class</span>="nu">1</span> + β·util(s,t)) + γ·max(<span <span class="k">class</span>="nu">0</span>, grid(t) − grid_ref),    p_floor, p_cap)margin(s,t) = price(s,t) − c_land(t) − c_ops(s)'}},children:[]},"D2.d3":{id:"D2.d3",level:3,parent:"D2",path:["Kepler — The Flywheel Decade","Energy & Charging","Reliability & the trust it buys"],title:"Driver 3 — Reliability & the trust it buys",body:`<p>The third driver of Energy &amp; Charging is the one the standalone financial model cannot see, because reliability shows up as an <strong>absence</strong> — the charge that did not fail, the queue that did not form, the trip the fleet did not have to abort <button class="cite" data-cite="S-028">S-028</button>. A DCF prices what happens; reliability's whole value is measured in what does not, so it never lands as a line item. Yet this is precisely how Energy moves the <strong>T</strong> term of the moat, and T is the term with the longest cross-domain reach <button class="cite" data-cite="S-028">S-028</button> — the same trust earned at the socket is the trust Payments, Logistics, and the fleet all draw on downstream.</p>`,children:["D2.d3.m1","D2.d3.m2"]},"D2.d3.m1":{id:"D2.d3.m1",level:4,parent:"D2.d3",path:["Kepler — The Flywheel Decade","Energy & Charging","Reliability & the trust it buys","Uptime as the atomic unit of trust"],title:"Mechanism 3.1 — Uptime as the atomic unit of trust",body:'<p>Trust in physical infrastructure is not a brand attribute; it is an <strong>empirical frequency</strong> <button class="cite" data-cite="S-029">S-029</button>. A user trusts the network to the exact degree that it works when they arrive — so we instrument it obsessively rather than assert it.</p><p>The utilization gauge reads the operating health of the estate at a glance. Network uptime sits at <strong>99.2%</strong> against a 99.0% target and an industry field average nearer 96% <button class="cite" data-cite="S-208">S-208</button>; session-success — a plug-in that ends in a completed charge — runs at 98.6% <button class="cite" data-cite="S-208">S-208</button>. The three-point gap between our uptime and the industry field average is not a bragging right. It is the <strong>raw material of T</strong>: the surplus reliability over what a rider expects elsewhere is exactly what converts into durable trust <button class="cite" data-cite="S-208">S-208</button>.</p><p>The cohort data shows why that surplus compounds. A user whose first three sessions all succeeded shows a <strong>4.1× higher 90-day retention</strong> than one who hit an early failed session, and — critically — a <strong>2.3× higher rate of activating the D4 wallet</strong> <button class="cite" data-cite="S-209">S-209</button>. The failed charge does not just cost one session; it poisons the trust that Payments was going to draw on <button class="cite" data-cite="S-209">S-209</button>. Reliability, measured this way, is the atomic unit the rest of the flywheel is built on.</p>',component:{family:"code",data:{file:"Uptime as the atomic unit of trust",lines:'  NETWORK UPTIME                 SESSION SUCCESS  ┌───────────────┐              ┌───────────────┐  │   ◐ <span <span class="k">class</span>="nu">99.2</span>%     │              │   ◑ <span <span class="k">class</span>="nu">98.6</span>%     │  │  ▁▃▅▇█ target  │              │  ▁▃▅▇  target │  │      <span <span class="k">class</span>="nu">99.0</span>%    │              │      <span <span class="k">class</span>="nu">98.0</span>%    │  └───────────────┘              └───────────────┘     ▲ green                        ▲ green  MEAN QUEUE WAIT (peak)         DC-FAST AVG DELIVERED  ┌───────────────┐              ┌───────────────┐  │   ◕ <span <span class="k">class</span>="nu">3.4</span> min   │              │   ◔ <span <span class="k">class</span>="nu">141</span> kW    │  │  target ≤<span <span class="k">class</span>="nu">5.0</span>  │              │  of <span <span class="k">class</span>="nu">150</span> rated │  │      green    │              │   <span <span class="k">class</span>="nu">94</span>% · green │  └───────────────┘              └───────────────┘'}},children:[]},"D2.d3.m2":{id:"D2.d3.m2",level:4,parent:"D2.d3",path:["Kepler — The Flywheel Decade","Energy & Charging","Reliability & the trust it buys","Reliability feeds T that Payments (D4) relies on"],title:"Mechanism 3.2 — Reliability feeds T that Payments (D4) relies on",body:`<p>This is the coupling that justifies housing energy and payments <strong>under one roof</strong> <button class="cite" data-cite="S-030">S-030</button>. Trust earned at the socket is fungible in the user's mind: the person who has learned that the Kepler charger always works is measurably more willing to let the Kepler wallet hold a balance, auto-pay, and eventually accept a credit line <button class="cite" data-cite="S-030">S-030</button>.</p><p>We can trace it in the funnel. Of users who reached <strong>"high-trust" status</strong> via a clean charging history, <strong>58% enabled auto-pay within 60 days</strong> versus 29% of the general base, and their D4 <strong>fraud-dispute rate ran 40% lower</strong> — reliable-infrastructure users are, empirically, lower-risk users <button class="cite" data-cite="S-210">S-210</button>. Energy is therefore a <strong>T-acquisition channel for Payments</strong>, and it is cheaper than any marketing D4 could run, because the trust is a by-product of a charge the user was going to buy anyway <button class="cite" data-cite="S-030">S-030</button>. There is no acquisition spend; the moat term is minted as a side effect of ordinary usage.</p><p>The mechanism chains forward one last time. If reliability is the asset that buys trust, then the <strong>durability of that reliability under a shifting grid</strong> is the thing we must stress-test — which is the fourth driver <button class="cite" data-cite="S-030">S-030</button>.</p>`,children:[]},"D2.d4":{id:"D2.d4",level:3,parent:"D2",path:["Kepler — The Flywheel Decade","Energy & Charging","The energy-transition scenario"],title:"Driver 4 — The energy-transition scenario",body:`<p>The final driver is the ten-year question that hangs over every charging asset the domain will ever build: does Energy's <strong>cost floor and trust ceiling survive a decarbonising, re-pricing grid</strong> <button class="cite" data-cite="S-031">S-031</button>? Alone among the six domains, its core input — the wholesale price of electricity — is set by forces outside Kepler entirely <button class="cite" data-cite="S-031">S-031</button>. We therefore refuse a point forecast, which would pretend to a precision we do not have, and instead model the domain as a tree of grid-price paths, each path mapped to a margin outcome <button class="cite" data-cite="S-031">S-031</button>.</p>`,children:["D2.d4.m1","D2.d4.m2"]},"D2.d4.m1":{id:"D2.d4.m1",level:4,parent:"D2.d4",path:["Kepler — The Flywheel Decade","Energy & Charging","The energy-transition scenario","The scenario tree from grid price to margin"],title:"Mechanism 4.1 — The scenario tree from grid price to margin",body:`<p>The tree branches on grid-price path → renewables mix → net domain contribution margin, and the headline is not a forecast but a distribution: the <strong>probability-weighted expected margin across the whole tree is +$0.036/kWh</strong> <button class="cite" data-cite="S-211">S-211</button>. The decisive feature, though, is the shape rather than the average — five of six branches are margin-positive <button class="cite" data-cite="S-211">S-211</button>. The single negative branch, *Squeeze* — in which grid prices rise and our PPAs reprice against us — carries only ~6% weight, and it carries so little precisely because the long-dated PPA book and the storage hedge (Mechanism 2.2) are the exact instruments built to collapse it <button class="cite" data-cite="S-211">S-211</button>. The tail that would sink a standalone charging business is the one we have already bought insurance against.</p><p>The strategically important reading is the second-order one <button class="cite" data-cite="S-212">S-212</button>. The two *Grid rises* branches are painful for standalone margin, yet they are actively helpful for the cost-advantage spread: when retail power spikes, our hedged landed cost spikes far less, so the gap we hand to Mobility (D1) and Logistics (D3) actually widens <button class="cite" data-cite="S-212">S-212</button>. The domain's cross-domain value is therefore <strong>counter-cyclical to its own P&amp;L</strong> — the branches that hurt the standalone Energy business are the same ones that most help the flywheel <button class="cite" data-cite="S-212">S-212</button>. That is why the tree matters strategically and not merely financially: read as a silo, a rising grid is a threat; read as a feeder, it is when the moat term Energy owns pays out hardest to the domains it supplies <button class="cite" data-cite="S-212">S-212</button>.</p>`,component:{family:"code",data:{file:"The scenario tree from grid price to margin",lines:'                          ┌─ Renewables &gt;<span <span class="k">class</span>="nu">60</span>% ──► margin +$<span <span class="k">class</span>="nu">0.061</span>/kWh   [Green-Cheap]   p≈.<span <span class="k">class</span>="nu">28</span>       ┌─ Grid falls ─────┤       │  (glut / solar)  └─ Renewables <span <span class="k">class</span>="nu">40</span>-<span <span class="k">class</span>="nu">60</span>% ► margin +$<span <span class="k">class</span>="nu">0.048</span>/kWh   [Green-Base]    p≈.<span <span class="k">class</span>="nu">17</span> START ┤       │                  ┌─ Storage scales ───► margin +$<span <span class="k">class</span>="nu">0.033</span>/kWh   [Volatile-Win]  p≈.<span <span class="k">class</span>="nu">22</span>       ├─ Grid volatile ──┤       │  (peaky)         └─ Storage lags ─────► margin +$<span <span class="k">class</span>="nu">0.012</span>/kWh   [Volatile-Thin] p≈.<span <span class="k">class</span>="nu">13</span>       │       └─ Grid rises ──────┬─ PPAs hold ───────► margin +$<span <span class="k">class</span>="nu">0.007</span>/kWh   [Hedged-Flat]   p≈.<span <span class="k">class</span>="nu">14</span>          (gas / carbon)   └─ PPAs reprice ────► margin −$<span <span class="k">class</span>="nu">0.009</span>/kWh   [Squeeze]       p≈.<span <span class="k">class</span>="nu">06</span>'}},children:[]},"D2.d4.m2":{id:"D2.d4.m2",level:4,parent:"D2.d4",path:["Kepler — The Flywheel Decade","Energy & Charging","The energy-transition scenario","Siting and dispatch as the hedge against the tree"],title:"Mechanism 4.2 — Siting and dispatch as the hedge against the tree",body:`<p>The tree is not a fate we merely await; the first three drivers are the instruments that <strong>bias us toward its upper branches</strong> <button class="cite" data-cite="S-033">S-033</button>. Data-led siting (1.1) concentrates the estate where renewables and storage are scaling fastest, tilting the renewables-mix fork in our favour before the price path is even known <button class="cite" data-cite="S-033">S-033</button>. Vertical procurement (1.2) locks the PPAs that hold in the *Grid rises* branch, so the very state that punishes an unhedged operator leaves us intact <button class="cite" data-cite="S-033">S-033</button>. Dispatch optimisation (2.2) is literally the mechanism that converts a *Volatile-Thin* world into a *Volatile-Win* one by arbitraging the peaks <button class="cite" data-cite="S-033">S-033</button>. Reliability (3.x) ensures that whatever branch we land in, the trust output — and therefore the D4 coupling back into the flywheel — is preserved <button class="cite" data-cite="S-033">S-033</button>.</p><p>The property this buys is the one we most want from an infrastructure asset facing a decade of grid re-pricing: <strong>every driver in this section is simultaneously an operating lever and a hedge on the transition tree</strong> <button class="cite" data-cite="S-033">S-033</button>. A lever in the good states, a hedge in the bad ones — the same mechanisms that raise the expected margin also compress the variance around it, which is why the tree's downside is shallow enough to leave five of six branches positive <button class="cite" data-cite="S-033">S-033</button>.</p>`,component:{family:"scenario-tree",data:{root:"10-year grid-price path → renewables mix → net domain contribution margin [S-211]",branches:[{label:"Squeeze",prob:.06,value:"negative margin",note:"Grid prices rise and our PPAs reprice against us — the single negative branch of the six. Carries only ~6% weight because the long-dated PPA book and the storage hedge (Mechanism 2.2) are built precisely to collapse it. [S-211]"},{label:"Grid rises (hedged)",prob:null,value:"positive margin; spread widens",note:"Painful for standalone margin, but hedged landed cost spikes far less than retail power, so the cost gap handed to Mobility (D1) and Logistics (D3) widens — the domain's cross-domain value is counter-cyclical to its own P&L. [S-212]"},{label:"Volatile → Win",prob:null,value:"positive margin",note:"Dispatch optimisation (Mechanism 2.2) arbitrages the peaks, converting what would be a Volatile-Thin world into a Volatile-Win one. [S-033]"},{label:"Renewables scale",prob:null,value:"positive margin",note:"Grid decarbonises and renewables/storage scale on plan; data-led siting (1.1) has already concentrated the estate here. The majority cluster among the five margin-positive branches. [S-211]"}],caption:"Six-branch tree; five of six branches margin-positive; probability-weighted expected margin +$0.036/kWh. Load-bearing (negative) branch Squeeze shown first. [S-211]"}},children:[]},D3:{id:"D3",level:2,parent:"GT",path:["Kepler — The Flywheel Decade","Logistics Marketplace"],title:"Domain 3 — Logistics Marketplace: liquidity is the product",body:"<p>Domain 3 is the only Kepler business whose moat term you can watch move in real time. It owns network liquidity (L) — the probability that, at any given moment in any given cell of any of our 42 cities, a courier and a merchant order can be matched inside the time and price window that both sides will accept. Mobility (D1) owns density, Devices (D5) own breadth, Payments (D4) and Energy (D2) own trust; Logistics owns the term that turns a pile of supply and a pile of demand into a market. And L is the most fragile of the four, because it is not a stock we accumulate but a flow we defend every fifteen minutes. A city can have thousands of couriers and thousands of hungry merchants and still be illiquid — if they are in the wrong places, priced wrong, or matched slowly, the market clears at 61% and both sides quietly churn. Liquidity is not headcount. Liquidity is the product, and everything in this section is a mechanism for manufacturing it.</p><p>The reason Logistics is sequenced third — after Mobility, before the marketplace scales past break-even — is that L is the term with the richest cross-feeds, and it is starved without them. Routing time, the single largest input to match quality, is fed by D1 mobility data: the same 3.1 billion monthly location traces that steer autonomous vehicles give our ETA models the real, congestion-aware travel time between any two points, which no standalone delivery app can match (trace S-301). The courier fleet's marginal energy cost is set by D2: e-bike and van charging runs on Kepler's own network at $0.038/km against a $0.091/km market blended rate, which is the difference between a courier earning a living wage at our take rate and not (S-302). Every payout and every merchant settlement runs cash-free through D4, which is what lets us pay couriers within nine seconds of drop-off and underwrite merchant working-capital advances against observed order flow (S-303). And the matching engine itself — the beating heart of L — is sharpened continuously by D6 models trained on the pooled interaction history of all six domains (S-304). Run Logistics as a standalone marketplace and it is a worse DoorDash. Run it as the liquidity organ of a flywheel and it is a market no standalone can price against.</p><p>Today Logistics is 18% of revenue (0.04/order blended, against a −0.31). It moves L from an indexed 0.38 to a target 0.71 over the plan — measured as fill rate × match-quality × repeat-rate, the composite defined below. The four drivers that follow are the machinery that does it, and they chain: two-sided liquidity is the physics, courier supply and merchant demand are the two pistons, and the matching engine is the crankshaft that converts both into cleared orders.</p>",finding:"What's true. Logistics is 18% of revenue, growing +34% yoy, roughly contribution-neutral today at +€0.04/order. The two-sided funnel leaks hard at the same cliff on both sides. The courier retention curve smiles and the ",children:["D3.d1","D3.d2","D3.d3","D3.d4"]},"D3.d1":{id:"D3.d1",level:3,parent:"D3",path:["Kepler — The Flywheel Decade","Logistics Marketplace","Two-sided liquidity: the core marketplace dynamic"],title:"Driver 1 — Two-sided liquidity: the core marketplace dynamic",body:'<p>Liquidity is the reflexive loop the Logistics Marketplace lives or dies inside, and stating it precisely is the whole discipline — not a slogan but the one dynamic every other lever in the domain ultimately routes through <button class="cite" data-cite="S-036">S-036</button>. <strong>More couriers online shortens pickup ETAs and cuts unfulfilled orders, which lifts merchant satisfaction and order volume, which densifies the earnings opportunities available per online hour, which pulls still more couriers online.</strong> That is the forward loop, and it compounds. But the same loop runs in reverse just as fast: a thin week thins the other side within two weeks, because couriers and merchants each read a degraded experience and quietly reallocate their next shift or next order elsewhere <button class="cite" data-cite="S-036">S-036</button>. The job, therefore, is two things at once — to bias the loop forward at the lowest subsidy cost, and to know, cell by cell and hour by hour, exactly where on the liquidity curve each market sits, because a market near the tipping point and a market already past it demand opposite interventions <button class="cite" data-cite="S-036">S-036</button>.</p>',children:["D3.d1.m1","D3.d1.m2"]},"D3.d1.m1":{id:"D3.d1.m1",level:4,parent:"D3.d1",path:["Kepler — The Flywheel Decade","Logistics Marketplace","Two-sided liquidity: the core marketplace dynamic","The liquidity composite and the two-sided funnel"],title:"Mechanism 1.1 — The liquidity composite and the two-sided funnel",body:`<p>Liquidity is refused as a single "orders" number, because that number hides the two independent conversion pipelines feeding it — and a headline that averages two failing sides can look healthy while both legs rot <button class="cite" data-cite="S-037">S-037</button>. Instead both sides are instrumented as a two-sided conversion funnel, and the shape of each side tells us precisely which piston is misfiring rather than merely that the engine is down <button class="cite" data-cite="S-305">S-305</button>.</p><p>The funnel makes the pathology legible. The courier side hemorrhages between "first shift" and "4+ shifts" — the exact moment a new courier learns whether the app can actually feed them enough well-paid jobs to bother staying. That <strong>58%→39% cliff is a liquidity problem masquerading as a retention problem</strong>: couriers churn not because onboarding is hard but because the market was thin the week they tried it <button class="cite" data-cite="S-037">S-037</button>. The merchant side leaks worst from "first order taken" to "10+ orders," and for the exactly symmetric reason — a restaurant that lists and then waits twenty minutes for a courier on its first lunch rush concludes we don't work, and never gives us a second service <button class="cite" data-cite="S-037">S-037</button>.</p><p>Both cliffs are the same cliff seen from two sides, which is the entire insight of two-sided liquidity: you cannot fix one funnel without the other, because each side's drop-off is the other side's thinness reflected back. That is why the composite is built as a product, not a sum: <strong>L = fill-rate × match-quality × repeat-rate</strong> is deliberately multiplicative so that improving one leg while starving another does not move it — the metric refuses to reward a lopsided fix <button class="cite" data-cite="S-306">S-306</button>.</p>`,component:{family:"code",data:{file:"The liquidity composite and the two-sided funn",lines:'TWO-SIDED CONVERSION FUNNEL  (indexed monthly cohort, illustrative mature city)  COURIER SUPPLY SIDE                         MERCHANT DEMAND SIDE  App install ......... <span <span class="k">class</span>="nu">100</span>%  (<span <span class="k">class</span>="nu">48</span>,<span <span class="k">class</span>="nu">200</span>)        Merchant signup ...... <span <span class="k">class</span>="nu">100</span>%  (<span <span class="k">class</span>="nu">3</span>,<span <span class="k">class</span>="nu">410</span>)    → Onboarded/verified  <span <span class="k">class</span>="nu">71</span>%  (<span <span class="k">class</span>="nu">34</span>,<span <span class="k">class</span>="nu">200</span>)         → Menu live/onboarded  <span <span class="k">class</span>="nu">78</span>%  (<span <span class="k">class</span>="nu">2</span>,<span <span class="k">class</span>="nu">660</span>)      → First shift        <span <span class="k">class</span>="nu">58</span>%  (<span <span class="k">class</span>="nu">27</span>,<span <span class="k">class</span>="nu">960</span>)          → First order taken   <span <span class="k">class</span>="nu">64</span>%  (<span <span class="k">class</span>="nu">2</span>,<span <span class="k">class</span>="nu">182</span>)        → <span <span class="k">class</span>="nu">4</span>+ shifts wk1    <span <span class="k">class</span>="nu">39</span>%  (<span <span class="k">class</span>="nu">18</span>,<span <span class="k">class</span>="nu">800</span>)            → <span <span class="k">class</span>="nu">10</span>+ orders wk1     <span <span class="k">class</span>="nu">47</span>%  (<span <span class="k">class</span>="nu">1</span>,<span <span class="k">class</span>="nu">603</span>)          → Active mo.<span <span class="k">class</span>="nu">2</span>    <span <span class="k">class</span>="nu">28</span>%  (<span <span class="k">class</span>="nu">13</span>,<span <span class="k">class</span>="nu">500</span>)              → Active mo.<span <span class="k">class</span>="nu">2</span>       <span <span class="k">class</span>="nu">41</span>%  (<span <span class="k">class</span>="nu">1</span>,<span <span class="k">class</span>="nu">398</span>)            → Retained mo.<span <span class="k">class</span>="nu">6</span> <span <span class="k">class</span>="nu">19</span>% (<span <span class="k">class</span>="nu">9</span>,<span <span class="k">class</span>="nu">160</span>)                → Retained mo.<span <span class="k">class</span>="nu">6</span>    <span <span class="k">class</span>="nu">33</span>%  (<span <span class="k">class</span>="nu">1</span>,<span <span class="k">class</span>="nu">125</span>)                                        ↑ the leaks that eat L ↑'}},children:[]},"D3.d1.m2":{id:"D3.d1.m2",level:4,parent:"D3.d1",path:["Kepler — The Flywheel Decade","Logistics Marketplace","Two-sided liquidity: the core marketplace dynamic","Cohort retention as the liquidity truth serum"],title:"Mechanism 1.2 — Cohort retention as the liquidity truth serum",body:'<p>Because the funnel is only a snapshot of who is converting now, the business is governed on cohort-retention curves — the honest, un-gameable record of whether each side actually stuck over time <button class="cite" data-cite="S-038">S-038</button>. The shapes of those curves are as diagnostic as the numbers, and two facts govern the entire plan.</p><p>First, the merchant curve flattens high. Merchants that survive their first month churn at <strong>under 3% a month</strong>, because a restaurant that has integrated Kepler into its lunch service faces real operational switching cost and, critically, because D4 working-capital advances — settled against the flow Kepler already observes — make Kepler a lender as well as a channel, which is a far stickier relationship than a delivery contract <button class="cite" data-cite="S-038">S-038</button>. That flat tail is where merchant lifetime value actually lives. Second, the courier curve smiles: it decays first, then stabilizes around a hard core of professional couriers doing 30+ hours a week who account for <strong>68% of delivered volume from just 19% of the retained cohort</strong> <button class="cite" data-cite="S-307">S-307</button>.</p><p>These two shapes dictate opposite tactics. For merchants, win month one and the curve holds itself — the investment belongs at the front. For couriers, over-invest in the professional core and treat the casual tail as elastic surge capacity, not as the base to be retained. Managing the two sides identically — the standalone-marketplace default — wastes subsidy on couriers who were always going to churn and under-serves merchants in the single month that decides their lifetime <button class="cite" data-cite="S-038">S-038</button>.</p>',component:{family:"code",data:{file:"Cohort retention as the liquidity truth serum",lines:'COHORT RETENTION — % of month-<span <span class="k">class</span>="nu">0</span> cohort still active   (mature-market blend) Courier cohorts                         Merchant cohorts100 ●                                   <span <span class="k">class</span>="nu">100</span> ●    ●●                                      ●●● <span <span class="k">class</span>="nu">60</span>   ●●●___                             <span <span class="k">class</span>="nu">75</span>      ●●●●●●____________  ← merchant curve       ▔▔▔▔▔●●●●________  ← smiles up          flattens HIGH &amp; FLAT <span <span class="k">class</span>="nu">28</span>          ▔▔▔▔▔▔▔●●●●●●  ← courier      <span <span class="k">class</span>="nu">41</span>             ▔▔▔▔▔▔▔▔▔▔▔▔▔▔                  ▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔     M0  M1  M2  M3  M4  M5  M6            M0  M1  M2  M3  M4  M5  M6'}},children:[]},"D3.d2":{id:"D3.d2",level:3,parent:"D3",path:["Kepler — The Flywheel Decade","Logistics Marketplace","Courier supply: manufacturing the sell side"],title:"Driver 2 — Courier supply: manufacturing the sell side",body:`<p>Couriers are the sell side of the logistics marketplace, and Kepler's thesis is that this side is not found, it is manufactured order by order. Couriers are <strong>half the market and the more volatile half</strong>, because their participation is priced by the hour against every other earning option in the city <button class="cite" data-cite="S-039">S-039</button> — a rider who could drive for mobility, run an errand, or simply stay home re-prices their labor every hour, so supply that was online at 6pm is gone by 7 unless something on the screen holds it. Supply is therefore not recruited once; it is summoned, and that is why the courier-facing surface — the app in a rider's hand — is treated as a first-class strategic asset, not a UI afterthought <button class="cite" data-cite="S-039">S-039</button>. The two mechanisms below are how the summoning is engineered: the job-offer screen that makes a single order legibly worth accepting in the seconds a courier gives it, and the elasticity model that prices the marginal hour so Kepler never subsidizes the whole population to solve a problem that lives only in the tail.</p>`,children:["D3.d2.m1","D3.d2.m2"]},"D3.d2.m1":{id:"D3.d2.m1",level:4,parent:"D3.d2",path:["Kepler — The Flywheel Decade","Logistics Marketplace","Courier supply: manufacturing the sell side","The job-offer surface: earning legible in one screen"],title:"Mechanism 2.1 — The job-offer surface: earning legible in one screen",body:`<p>A courier decides to <strong>accept or decline in under four seconds</strong> <button class="cite" data-cite="S-040">S-040</button>. Everything that determines whether L — marketplace liquidity — holds has to be legible inside that window: the guaranteed payout, the honest ETA, the surge multiplier, and the batching. The live in-app job-offer screen and the push that precedes it are real production copy <button class="cite" data-cite="S-308">S-308</button>, and every element on it is a liquidity lever with a specific cross-feed behind it.</p><ul><li>The <strong>€14.20 is guaranteed, not estimated</strong> — the courier is paid that number even if the drop runs long. That guarantee is only underwritable because D4 (payments) pays out in nine seconds and D6 (the data platform) predicts route time tightly enough that guarantee variance stays at ±7% <button class="cite" data-cite="S-040">S-040</button>. A standalone app that cannot bound
