ecision","The manufacturing Gantt and the concentration risk it exposes (S-511, S-512)"],title:"Mechanism 3.2 — The manufacturing Gantt and the concentration risk it exposes (S-511, S-512)",body:`<p>The ramp plots the KB-1 v2 and the embedded KN-2 across quarters from FY26 to FY27 <button class="cite" data-cite="S-511">S-511</button>, and the schedule makes one dependency unmissable <button class="cite" data-cite="S-512">S-512</button>: <strong>the KN-2 embedded module's mass production is gated on the D1 vehicle manufacturing line</strong>, because the Node is built into vehicles at their point of assembly, not retrofitted afterward. This is the cross-domain coupling expressed as a schedule constraint — Devices cannot ramp its highest-breadth embedded sensor any faster than Mobility ramps the vehicles it lives inside.</p><p>The strategic reading is that <strong>Devices' breadth-compounding is paced by D1's fleet growth</strong>, which is precisely why sequencing — the governing thought — matters: place the sensor line and the vehicle line out of sync and the moat forms slower than the model requires <button class="cite" data-cite="S-512">S-512</button>. Get them in phase and every vehicle rolling off D1's line ships a sensor into the field at zero incremental placement cost.</p><p>The Gantt surfaces a second edge case as well — the <strong>concentration risk on Jabil Penang and the single Singapore port hub</strong>. A typhoon-season disruption at Klang or Penang is a direct hit to breadth, not merely to margin, so the FY27 plan carries a <strong>qualified second final-assembly node as insurance</strong>, accepted as a margin cost paid explicitly against sensor-coverage continuity <button class="cite" data-cite="S-512">S-512</button>.</p>`,component:{family:"code",data:{file:"The manufacturing Gantt and the concentration ",lines:`                    Q1<span <span class="k">class</span>=<span <span class="k">class</span>="s">"s"</span>>'<span <span class="k">class</span>="nu">26</span>  Q2'</span><span <span class="k">class</span>="nu">26</span>  Q3<span <span class="k">class</span>=<span <span class="k">class</span>="s">"s"</span>>'<span <span class="k">class</span>="nu">26</span>  Q4'</span><span <span class="k">class</span>="nu">26</span>  Q1<span <span class="k">class</span>=<span <span class="k">class</span>="s">"s"</span>>'<span <span class="k">class</span>="nu">27</span>  Q2'</span><span <span class="k">class</span>="nu">27</span> SoC tape-out/qual  ████░░ Sensor sourcing    ░████░ EVT (eng. valid.)   ░███░░ DVT (design valid.)     ░████░ PVT (prod. valid.)        ░███░ Jabil line bring-up        ░████░ Mass prod. KB-1v2             ░██████████████ KN-<span <span class="k">class</span>="nu">2</span> embed (into D1)              ░████████████   ← gated on D1 vehicle line Cert (CE/FCC/PSA)          ░████░`}},children:[]},"D5.d4":{id:"D5.d4",level:3,parent:"D5",path:["Kepler — The Flywheel Decade","Devices & Hardware","Proprietary sensor data is the real product"],title:"Driver 4 — Proprietary sensor data is the real product",body:`<p>Everything above in Devices — the four form factors, the thin-on-purpose margin, the fleet-ridden supply chain — exists to serve one end: proprietary sensor data. Devices' claim on the moat is <strong>breadth (B)</strong>, the one term this domain owns, and this driver is where breadth stops being a slogan and becomes measurable value — value that lowers cost and raises trust across the other five domains' P&amp;Ls rather than showing up in a device margin of its own <button class="cite" data-cite="S-076">S-076</button>.</p>`,children:["D5.d4.m1","D5.d4.m2"]},"D5.d4.m1":{id:"D5.d4.m1",level:4,parent:"D5.d4",path:["Kepler — The Flywheel Decade","Devices & Hardware","Proprietary sensor data is the real product","The five-modality manifold and its uniqueness (S-513)"],title:"Mechanism 4.1 — The five-modality manifold and its uniqueness (S-513)",body:'<p>The Kepler manifold captures <strong>five broad, mutually-reinforcing modalities</strong> that no competitor has jointly instrumented at fleet scale <button class="cite" data-cite="S-513">S-513</button>:</p><ul><li>kinematic — a 400 Hz 6-axis IMU reading road roughness, grip torque, and crash signatures;</li><li>environmental — particulate, VOC, and humidity sensing that builds air-quality maps street-by-street;</li><li>acoustic — a MEMS array capturing failing-relay and bearing signatures for predictive maintenance;</li><li>positional — dual-band GNSS resolving position to sub-metre, lane-level rather than road-level;</li><li>electrical — battery-cell impedance and charger telemetry carried by the KN-2.</li></ul><p>The uniqueness is <strong>not any single stream</strong> — competitors buy IMUs and GNSS too, and can match Kepler on any one axis. It is the <strong>joint distribution</strong>: only Kepler observes all five from the same calibrated node, time-aligned, across the same 42-city fleet <button class="cite" data-cite="S-077">S-077</button>. That co-observation is the raw material breadth is made of, and it is why the sample cannot be reconstructed after the fact by anyone lacking the placed hardware — the modalities correlate node-by-node, and the correlations are the asset, not the streams.</p>',children:[]},"D5.d4.m2":{id:"D5.d4.m2",level:4,parent:"D5.d4",path:["Kepler — The Flywheel Decade","Devices & Hardware","Proprietary sensor data is the real product","How breadth sharpens D6, and the value attribution (S-514, S-515)"],title:"Mechanism 4.2 — How breadth sharpens D6, and the value attribution (S-514, S-515)",body:`<p>The manifold's payoff is realised in D6's models, and the couplings are specific <button class="cite" data-cite="S-514">S-514</button>. <strong>Kinematic</strong> road-roughness data sharpens D1's routing and ride-comfort models and feeds D2's siting — rough corridors correlate with battery-drain hotspots worth a charger. <strong>Acoustic</strong> fault signatures drive predictive maintenance across the D1 fleet and the D2 charger network, converting reactive downtime into scheduled service. <strong>Electrical</strong> telemetry from the KN-2 feeds D2's battery-health and dispatch pricing. And the on-device secure element plus placement context feed D4's fraud model — a payment tap whose device reports an impossible kinematic trajectory is a fraud signal no card network can see.</p><p>The second data table quantifies the attributed lift — Kepler's internal model-improvement attribution from the sensor manifold, FY26 estimate <button class="cite" data-cite="S-515">S-515</button>. That table is the answer to the board's fair challenge — <strong>is the compounding real or a story?</strong> Each row is a coupling the governing thought predicts, now carrying a number. Breadth (B) is not an abstraction; it is a <strong>−18% downtime</strong> figure and an <strong>−11% fraud false-positive</strong> figure that land on other domains' P&amp;Ls, not on Devices' own <button class="cite" data-cite="S-516">S-516</button>.</p><p>The edge-case worth naming: the environmental modality produces a saleable data product — street-level air quality sold to municipalities — the one place Devices' data monetises directly rather than only through internal model lift. It is a hedge that gives the breadth thesis an external price signal to validate against, so the −18% and −11% attributions are not the only evidence the compounding is real.</p>`,component:{family:"faceted-grid",data:{cols:["Modality","Primary model fed (domain)","Attributed improvement","Value mechanism"],rows:[["Kinematic (IMU)","Routing / comfort (D1)","+6.1% route-quality score","Fewer reroutes, higher rider retention (D)"],["Environmental","Air-quality maps (D6→D1)","New data product","Sold to cities; sharpens siting (D2)"],["Acoustic","Predictive maint. (D1/D2)","−18% unplanned downtime","Uptime → trust (T)"],["Electrical","Battery health / dispatch (D2)","+4.3% charge-throughput","Lower marginal cost of energy"],["Positional","Fraud geo-signals (D4)","−11% false-positive fraud","Fewer declined good txns (T)"]],negCols:[2]}},children:[]},D6:{id:"D6",level:2,parent:"GT",path:["Kepler — The Flywheel Decade","Data & AI Platform"],title:"Domain 6 — Data & AI Platform: the moat is not a business, it is the hub of the flywheel",body:"<p>Every other domain section in this document ends by naming which of the four moat terms it moves and which domains it feeds. Domain 6 is where those threads are tied. It is the only domain that does not own a customer, a vehicle, a charger, a courier, or a card — and it is the only domain whose output is the moat identity itself. Read as a P&amp;L it is an embarrassment: a −$420m cost centre, the single largest line item the conglomerate-discount bears say proves Kepler is undisciplined. Read as the spine, it is the reason the other five stop being five. Domain 6 owns and compounds data breadth (B) directly — it is the layer that turns proprietary sensor and behaviour exhaust into features no competitor can assemble — and it is the only layer that touches all four terms of</p><p>because it is the multiplication. D1 produces density, D3 produces liquidity, D2 and D4 produce trust, D5 produces breadth — but M is a product, not a sum, and a product only exists once the terms are computed together on shared features. That computation is Domain 6. The cross-feeds are unusually literal here: Domain 6 ingests D1 location traces, D5 sensor telemetry, D3 marketplace supply–demand events, and D4 fraud/settlement signals, and it serves models back — routing, siting, matching, scoring, safety — that raise D1's density, D2's reliability, D3's liquidity, and D4's approval rates. The flywheel is not a metaphor Domain 6 illustrates; it is the graph Domain 6 runs. This section opens the hub, walks its four drivers, and closes on what is settled versus what the next decade is decided by.</p>",finding:"What's settled. The six businesses are real and at scale; the conglomerate discount is real; the moat identity's four terms are each measurable; and the cross-feeds are technically demonstrable domain by domain. None of ",children:["D6.d1","D6.d2","D6.d3","D6.d4"]},"D6.d1":{id:"D6.d1",level:3,parent:"D6",path:["Kepler — The Flywheel Decade","Data & AI Platform","The platform architecture: one ingestion spine, one feature store, one serving layer"],title:"Driver 1 — The platform architecture: one ingestion spine, one feature store, one serving layer",body:`<p>The first driver is the least glamorous and the most decisive: there is exactly <strong>one data platform, not six</strong> <button class="cite" data-cite="S-081">S-081</button>. This is not a preference for tidiness; it is the load-bearing precondition for everything the Data &amp; AI Platform claims to do, because the moat identity M = D × B × L × T multiplies its terms rather than adding them, and a term cannot be multiplied by a domain that cannot read it.</p><p>The conglomerate failure mode is not strategic disagreement — it is six teams each standing up their own warehouse, their own feature definitions, their own model registry, so that "rider dwell time" means one thing in D1 and a subtly different thing in D3, and the join that would have produced a feature never happens <button class="cite" data-cite="S-081">S-081</button>. Divergence of that kind is silent: nobody decides to fragment the data, it fragments by default the moment six schemas are allowed to drift. Domain 6's architecture exists to make that divergence structurally impossible — one ingestion spine, one feature store, one serving layer, built so the pipes come before anything that flows through them.</p>`,children:["D6.d1.m1","D6.d1.m2","D6.d1.m3"]},"D6.d1.m1":{id:"D6.d1.m1",level:4,parent:"D6.d1",path:["Kepler — The Flywheel Decade","Data & AI Platform","The platform architecture: one ingestion spine, one feature store, one serving layer","A single ingestion spine that normalises six event streams into one grammar"],title:"Mechanism 1.1 — A single ingestion spine that normalises six event streams into one grammar",body:'<p>Every physical-world interaction across the estate emits an event: a ride start, a charge session, a courier accept, a card authorisation, a device heartbeat <button class="cite" data-cite="S-082">S-082</button>. All six domains publish to a <strong>single append-only event bus</strong> — Kepler calls it the Interaction Log — under one canonical schema: entity_id, geohash, t, domain, event_type, payload, trust_context <button class="cite" data-cite="S-601">S-601</button>. The schema is the whole trick. Because every domain speaks the same seven-field grammar, an event from D2 charging and an event from D4 payments land in the same log, keyed the same way, and become joinable without a translation layer that would never have been built. At 28.4m MAU across 42 cities, the spine ingests ~3.9bn events/day at peak <button class="cite" data-cite="S-082">S-082</button> — a volume that only stays coherent because there is one grammar rather than six.</p><p>The point of one grammar is the <strong>point-in-time join</strong>: any feature can be reconstructed as it was known at decision time, so a fraud model never trains on settlement data that only existed after the authorisation <button class="cite" data-cite="S-602">S-602</button>. That guardrail against label leakage is not a modelling nicety — it is what makes cross-domain signal safe to use at all. It is what lets D4 signals safely sharpen D1–D3 without leakage, a cross-feed that is impossible in a six-warehouse world because the timestamps never reconcile <button class="cite" data-cite="S-602">S-602</button>. The architecture diagram is the physical shape of the platform, and every later mechanism is a path through it <button class="cite" data-cite="S-601">S-601</button>.</p>',component:{family:"code",data:{file:"A single ingestion spine that normalises six e",lines:'                         KEPLER DATA &amp; AI PLATFORM — SYSTEM ARCHITECTURE                         (ingestion → feature store → models → serving)  SOURCES                INGESTION            FEATURE STORE          MODELS            SERVING ┌────────┐   events   ┌───────────┐  clean  ┌──────────────┐  vec  ┌─────────┐  API ┌──────────┐ │ D1 ride│──────────▶ │           │────────▶│ offline (parq)│─────▶ │ routing │────▶ │ D1 fleet │ │ D2 chg │──────────▶ │ Interaction│         │  + online (kv)│      │ siting  │      │ D2 dispat│ │ D3 mkt │──────────▶ │   Log bus │  dedup  │              │  ⟳    │ matching│      │ D3 match │ │ D4 pay │──────────▶ │  (Kafka)  │────────▶│  point-<span class="k">in</span>-   │◀─────│ scoring │────▶ │ D4 auth  │ │ D5 dev │──────────▶ │  + Flink  │  PII    │  time joins  │ label │ safety  │      │ D5 OTA   │ │ ext geo│──────────▶ │  normalise│  vault  │              │      │ demand  │      │ dashbds  │ └────────┘            └───────────┘         └──────────────┘      └─────────┘      └──────────┘                            │                       ▲   │              ▲                 │                       trust_context           feature  └── training ──┘         model outputs                       tagging (D4) ───────────▶ registry      registry ◀── eval/ROC (Driver <span <span class="k">class</span>="nu">3</span>)                                                (S-<span <span class="k">class</span>="nu">603</span>)         (S-<span <span class="k">class</span>="nu">611</span>)          feedback ⟳ (Driver <span <span class="k">class</span>="nu">4</span>)'}},children:[]},"D6.d1.m2":{id:"D6.d1.m2",level:4,parent:"D6.d1",path:["Kepler — The Flywheel Decade","Data & AI Platform","The platform architecture: one ingestion spine, one feature store, one serving layer","A feature store that is the physical form of data breadth (B)"],title:"Mechanism 1.2 — A feature store that is the physical form of data breadth (B)",body:'<p>The Interaction Log is raw; the feature store is where <strong>breadth B actually lives</strong> <button class="cite" data-cite="S-083">S-083</button>. Raw events are not features — breadth is not the count of streams, it is the count of computed, reusable signals every domain can draw on. The feature store holds two mirrored surfaces: an offline store (columnar, for training) and an online store (key-value, sub-10ms, for serving), guaranteeing train/serve parity so a model sees the same value in production that it saw in training <button class="cite" data-cite="S-603">S-603</button>. A feature computed once — say geohash_demand_z_15m, the 15-minute demand z-score for a location — is available to D1 routing, D2 siting, and D3 matching from the same row <button class="cite" data-cite="S-603">S-603</button>.</p><p>This is the precise mechanism by which B compounds instead of fragmenting: each new domain does not add a warehouse, it adds columns other domains can read <button class="cite" data-cite="S-083">S-083</button>. In a six-warehouse world that same z-score is computed three times, three subtly different ways, and shared by none; here it is one row read by three consumers, and the marginal domain lifts the breadth term for all of them.</p><p>Note feat_entity.trust_score and feat_entity.pay_default_pd: those columns are written by D4 and read by D1 — to decide which riders can go cash-free — the payments-closes-the-loop coupling made concrete as two columns in one table <button class="cite" data-cite="S-083">S-083</button>. The cross-feed the flywheel depends on is not an integration project; it is a column reference.</p>',component:{family:"faceted-grid",data:{cols:["Feature-store table","Grain","Key columns","Refresh","Primary consumers"],rows:[["feat_location","geohash-7 × 15min","demand_z, dwell_p50, charge_gap_min, incident_rate_90d","streaming","D1, D2, D3"],["feat_entity","user/device × day","trust_score, mob_freq_30d, pay_default_pd, sensor_health","hourly","D4, D5, D1"],["feat_edge","origin→dest × hour","eta_resid, match_prob, courier_supply_z, surge_state","streaming","D3, D1"],["feat_asset","vehicle/charger × 5min","soc_pct, util_rate, fault_flag, telemetry_drift","streaming","D2, D5, D1"]],negCols:[]}},children:[]},"D6.d1.m3":{id:"D6.d1.m3",level:4,parent:"D6.d1",path:["Kepler — The Flywheel Decade","Data & AI Platform","The platform architecture: one ingestion spine, one feature store, one serving layer","A serving layer that returns models to the domains that fed them"],title:"Mechanism 1.3 — A serving layer that returns models to the domains that fed them",body:'<p>Breadth is inert until it is served back — a feature store no domain can query at decision time is just an expensive archive. The serving layer exposes every model behind <strong>one low-latency API with a shared contract</strong>, so a domain requests a decision — route, site, match, authorise, flag — and receives it in &lt;60ms p95 without knowing which features or which upstream domains produced it <button class="cite" data-cite="S-604">S-604</button>. The abstraction is the point: a consumer domain does not integrate against five other domains, it integrates against one contract, and the hub resolves the rest. This is the architectural expression of "all five draw from the hub" <button class="cite" data-cite="S-604">S-604</button>.</p><p>It also means a model improvement — better ETA residuals from richer D5 telemetry, say — propagates to every consumer at once, rather than being re-implemented five times <button class="cite" data-cite="S-604">S-604</button>. One improvement, served through one API, lifts every domain that reads it simultaneously; that is compounding rather than copying. Driver 1 has now built the pipes — one spine, one feature store, one serving layer; Driver 2 explains what flows through them and why it compounds <button class="cite" data-cite="S-084">S-084</button>.</p>',children:[]},"D6.d2":{id:"D6.d2",level:3,parent:"D6",path:["Kepler — The Flywheel Decade","Data & AI Platform","The data flywheel: how five domains' data compounds into one moat"],title:"Driver 2 — The data flywheel: how five domains' data compounds into one moat",body:`<p>The architecture is necessary but not sufficient. A pipe that carries six streams to six destinations is still a conglomerate with good plumbing — real infrastructure, no moat. The flywheel is the sharper claim: each domain's data raises the value of every other domain's data <strong>super-additively</strong>, so breadth B is not the sum of six datasets but their product on shared keys <button class="cite" data-cite="S-085">S-085</button>. Driver 2 is the mechanism of that compounding, and its centrepiece is the data-flow Sankey and the flywheel network graph — the two pictures that show the multiplication rather than the addition, and the place where the moat identity M = D × B × L × T either earns its multiplication sign or does not.</p>`,children:["D6.d2.m1","D6.d2.m2","D6.d2.m3"]},"D6.d2.m1":{id:"D6.d2.m1",level:4,parent:"D6.d2",path:["Kepler — The Flywheel Decade","Data & AI Platform","The data flywheel: how five domains' data compounds into one moat","Cross-domain joins create features no single domain could hold"],title:"Mechanism 2.1 — Cross-domain joins create features no single domain could hold",body:'<p>The compounding is concrete, and it lives in specific joins no single-vertical firm can compute. <strong>S-605</strong>: D1 location traces, D5 accelerometer telemetry, and D3 courier GPS join on geohash × t to produce two features — `road_roughness` and `curb_availability`. Neither is a curiosity. Road_roughness improves D1 routing and D3 drop-off ETA at the same time, and curb_availability feeds D2 charger-siting, because rough approach roads depress charger utilisation <button class="cite" data-cite="S-086">S-086</button>. No competitor with only a rideshare app, or only a delivery app, can compute either feature — none holds all three streams on one key, so the join simply does not exist inside their data.</p><p><strong>S-606</strong> is the second join, and it points at trust rather than routing. D4 authorisation outcomes join to D1 rider history and D5 device fingerprint to lift the fraud model. A card-decline pattern that reads as noise in isolation becomes explicable once the same entity\'s mobility regularity and device health are columns in the same row — a legitimate rider on a healthy device is a different risk than the identical decline attached to neither <button class="cite" data-cite="S-086">S-086</button>.</p><p>The data-flow Sankey makes the accumulation visible: the six sources are the left band, the moat is the single right node, and each ribbon\'s width is the share of the moat\'s feature value that source contributes. That last line is the whole argument in one number. The <strong>+19% cross-join uplift</strong> is feature value that literally cannot exist for a focused specialist, because producing it requires two streams the specialist does not both own <button class="cite" data-cite="S-086">S-086</button>. It is the quantified answer to the SCQA\'s question — the compounding is real, not a story, and it is measurable as the fraction of served feature value that lives only on joins.</p>',component:{family:"code",data:{file:"Cross-domain joins create features no single d",lines:'        DATA-FLOW SANKEY — six domains → the moat (ribbon width = feature-value contribution)  D1 Mobility      ████████████████████████████  <span <span class="k">class</span>="nu">34</span>%  ┐  D5 Devices       ██████████████████            <span <span class="k">class</span>="nu">22</span>%  ┤  D3 Logistics     ████████████                  <span <span class="k">class</span>="nu">16</span>%  ┤        ┌───────────────┐  D4 Payments      ██████████                    <span <span class="k">class</span>="nu">13</span>%  ┼──────▶ │  THE MOAT (M) │  D2 Energy        ████████                       <span <span class="k">class</span>="nu">9</span>%  ┤        │  B compounded │  ext / partner    ██████                         <span <span class="k">class</span>="nu">6</span>%  ┘        └───────────────┘                                                 ───                                                 <span <span class="k">class</span>="nu">100</span>%   Cross-join uplift (features that exist ONLY on ≥<span <span class="k">class</span>="nu">2</span> joined streams): +<span <span class="k">class</span>="nu">19</span>% of served feature value   → this band is the flywheel: it is zero <span class="k">for</span> any standalone competitor.'}},children:[]},"D6.d2.m2":{id:"D6.d2.m2",level:4,parent:"D6.d2",path:["Kepler — The Flywheel Decade","Data & AI Platform","The data flywheel: how five domains' data compounds into one moat","The flywheel network graph: the coherency centrepiece"],title:"Mechanism 2.2 — The flywheel network graph: the coherency centrepiece",body:`<p>If the Sankey shows how much each domain feeds the moat, the network graph shows that every feed is also a return — the loop that makes the wheel a wheel. This is the single most important picture in the section: the six domains as nodes, the moat as the hub, and directed edges running in both directions — raw data in, models out <button class="cite" data-cite="S-087">S-087</button>.</p><p><strong>S-607</strong>: the graph is directed, and the strategic content lives in the return edges, not the input ones.</p><ul><li>D1 sends traces and receives routing and safety models that raise density D by cutting deadhead miles <strong>~11%</strong>.</li><li>D4 sends fraud and settlement signals and receives a credit model that raises trust T — which is precisely what lets D1 and D3 run cash-free.</li><li>D5 sends proprietary sensor telemetry — the breadth B no competitor holds — and receives OTA and health models back.</li></ul><p>Delete the hub and the picture collapses into six unconnected nodes. That collapse is the visual proof of the governing thought: the conglomerate discount is the market pricing the six nodes on a sum-of-the-parts basis; the flywheel is the edges the market cannot see, because a return edge never shows up in any single domain's standalone P&amp;L <button class="cite" data-cite="S-087">S-087</button>.</p>`,component:{family:"code",data:{file:"The flywheel network graph: the coherency cent",lines:'              FLYWHEEL NETWORK GRAPH — six domains feeding &amp; fed by the moat (D6 hub)                                   ┌─────────────┐                    location ─────▶│   D1        │◀───── routing, safety models                    behaviour      │  MOBILITY   │       (raises density D)                                   └─────┬───────┘                        electrons ▲      │ traces         ▲ siting model (raises T)                   ┌─────────────┐│      ▼                │┌─────────────┐        util model │   D2        ││  ┌───────────┐        ││   D5        │       ───────────▶│  ENERGY     │└─▶│           │◀───────┘│  DEVICES    │◀── OTA/health model                   └─────────────┘   │  D6  MOAT │  sensor └─────────────┘   (raises B)                        supply▲      │  (hub, M) │  telem       ▲                   ┌─────────────┐   │           │        ┌─────────────┐      match model  │   D3        │──▶│           │◀───────│   D4        │  fraud/credit model       ───────────▶│ LOGISTICS   │   └───────────┘  auth  │  PAYMENTS   │──▶ (raises trust T)                   └─────────────┘     ▲   fraud+trust     └─────────────┘                                       │   signals close the loop (T)     Every edge <span class="k">IN</span> (data) has a paired edge OUT (model). Remove D6 and the graph is six isolated nodes.'}},children:[]},"D6.d2.m3":{id:"D6.d2.m3",level:4,parent:"D6.d2",path:["Kepler — The Flywheel Decade","Data & AI Platform","The data flywheel: how five domains' data compounds into one moat","Compounding shows up as a rising blended contribution"],title:"Mechanism 2.3 — Compounding shows up as a rising blended contribution",body:`<p>The flywheel's output is economic, and the number is the one the entire document is anchored to: blended contribution per interaction rising from <strong>−0.31</strong> over ten years. Mechanism 2.3 attributes that swing to the moat rather than to any one domain's margin <button class="cite" data-cite="S-088">S-088</button>.</p><p><strong>S-608</strong>: each 10% rise in served feature value — mostly the cross-join band from Mechanism 2.1 — lowers three marginal costs at once: the cost of a mobility decision (fewer empty miles), of a logistics match (higher fill), and of a payment authorisation (fewer false declines). They fall together because all three read the same improved features <button class="cite" data-cite="S-088">S-088</button>. That simultaneity is the point. One investment in breadth pays out across four domains at once, which is why Domain 6's <strong>−$420m</strong> is not a cost centre but the price of the multiplier — the line item that buys the multiplication sign in M = D × B × L × T. Driver 3 is how that feature value becomes decisions <button class="cite" data-cite="S-088">S-088</button>.</p>`,children:[]},"D6.d3":{id:"D6.d3",level:3,parent:"D6",path:["Kepler — The Flywheel Decade","Data & AI Platform","The models: turning compounded breadth into decisions that move D, L, and T"],title:"Driver 3 — The models: turning compounded breadth into decisions that move D, L, and T",body:'<p>Features are potential; models are where the moat is realised. Driver 3 is the conversion layer — the point at which breadth <strong>B</strong> is turned into the three terms that actually move the number: density <strong>D</strong> through routing, liquidity <strong>L</strong> through matching, and trust <strong>T</strong> through scoring and safety <button class="cite" data-cite="S-089">S-089</button>. The strategic claim underneath is blunt: the models are better because the data is broader. A claim like that is only worth stating if it is shown rather than asserted, which is why this driver carries model-performance evidence — ROC curves and a confusion matrix with real figures — instead of a narrative about model quality <button class="cite" data-cite="S-089">S-089</button>. The curve below is that evidence: the same fraud/trust model scored on D4 data alone against the full cross-domain join, with the operating point held at a fixed 0.5% false-positive rate so the gain is read as recall, not as a moved goalpost <button class="cite" data-cite="S-089">S-089</button>.</p>',component:{family:"time-series",data:{unit:"recall (TPR) vs false-positive rate",series:[{name:"D4 data only (AUC 0.883)",dash:"4 3",pts:[[0,0],[.005,.712],[1,1]]},{name:"Full cross-domain join (AUC 0.947)",dash:"0",pts:[[0,0],[.005,.899],[1,1]]}],mark:{name:"0.5% FPR operating point: 71.2% -> 89.9% recall",x:.005,y:.899}}},children:["D6.d3.m1","D6.d3.m2","D6.d3.m3"]},"D6.d3.m1":{id:"D6.d3.m1",level:4,parent:"D6.d3",path:["Kepler — The Flywheel Decade","Data & AI Platform","The models: turning compounded breadth into decisions that move D, L, and T","A shared model registry so one improvement propagates to five domains"],title:"Mechanism 3.1 — A shared model registry so one improvement propagates to five domains",body:'<p>The first mechanism is organisational, not statistical: <strong>models are not owned by domains</strong>. Every model is registered in a single shared registry with tracked lineage and consumed through one serving API, so no domain runs a private copy <button class="cite" data-cite="S-090">S-090</button>. The routing model, the matching model, and the fraud model all draw from the same underlying feature tables. That shared substrate is what makes one improvement propagate: lift a single feature — say `feat_location.demand_z`, improved by folding in D2 charge-gap data — and routing, matching, and fraud all inherit the gain at once, because all three read that column <button class="cite" data-cite="S-090">S-090</button>. This is the concrete content of *sequence, don\'t silo*. A siloed org retrains three models three times against three partial datasets and pays the retraining cost three times over, each on a thinner slice of the truth; the platform retrains the feature once and every consuming model inherits it for free <button class="cite" data-cite="S-090">S-090</button>. One write, five readers — the propagation is the flywheel doing arithmetic, and it is why a broad platform pulls ahead of three narrow specialists even when none of the three is individually worse.</p>',children:[]},"D6.d3.m2":{id:"D6.d3.m2",level:4,parent:"D6.d3",path:["Kepler — The Flywheel Decade","Data & AI Platform","The models: turning compounded breadth into decisions that move D, L, and T","Model performance demonstrably tracks data breadth"],title:"Mechanism 3.2 — Model performance demonstrably tracks data breadth",body:'<p>The claim that breadth *causes* performance is not left as rhetoric — Domain 6 tests it by ablation. Each model is trained twice: once on a single-domain feature set, once on the full cross-joined set, and the lift between them is measured directly <button class="cite" data-cite="S-091">S-091</button>. The figures here are the fraud/trust model, chosen because it is the cleanest labelled problem and because it is the D4 coupling made visible <button class="cite" data-cite="S-091">S-091</button>.</p><p>The result is decisive. AUC moves from <strong>0.883 on D4 data alone to 0.947 on the full cross-domain join</strong>, and at a fixed 0.5% false-positive rate recall rises from 71.2% to 89.9% — an <strong>+18.7-point</strong> improvement <button class="cite" data-cite="S-610">S-610</button>. Every point of that lift comes from joining D1 mobility-regularity and D5 device-health features onto the D4 fraud label; nothing about the D4 model itself changed <button class="cite" data-cite="S-610">S-610</button>. That delta is the entire flywheel compressed into one confusion matrix: the false decline a single-vertical specialist is forced to eat, Kepler catches — not because its model is cleverer, but because the specialist never holds the mobility and device streams to join in the first place <button class="cite" data-cite="S-610">S-610</button>. And higher recall at a fixed false-positive rate is trust <strong>T</strong> stated precisely — fewer fraud losses and fewer false declines at once — served straight back into D4 approval rates, where it lifts the very number the payments domain is judged on <button class="cite" data-cite="S-610">S-610</button>.</p>',component:{family:"code",data:{file:"Model performance demonstrably tracks data bre",lines:'   ROC — fraud/trust model (S-<span <span class="k">class</span>="nu">610</span>)              CONFUSION MATRIX @ operating point (<span <span class="k">class</span>="nu">0.5</span>% FPR)   TPR                                                        PREDICTED   <span <span class="k">class</span>="nu">1.0</span> |            ╭────────── full (AUC <span <span class="k">class</span>="nu">0.947</span>)              │  legit    fraud       |         ╭──╯                                  ┌──────┼─────────────────   <span <span class="k">class</span>="nu">0.8</span> |      ╭──╯   ╭──────── D4-only (AUC <span <span class="k">class</span>="nu">0.883</span>)   A │legit │ <span <span class="k">class</span>="nu">1</span>,<span <span class="k">class</span>="nu">984</span>,<span <span class="k">class</span>="nu">120</span>   <span <span class="k">class</span>="nu">9</span>,<span <span class="k">class</span>="nu">940</span>   (FPR <span <span class="k">class</span>="nu">0.50</span>%)       |     ╱    ╭──╯                                C │      │   <span <span class="k">class</span>="nu">0.6</span> |    ╱  ╭──╯                                   T │fraud │   <span <span class="k">class</span>="nu">1</span>,<span <span class="k">class</span>="nu">610</span>   <span <span class="k">class</span>="nu">14</span>,<span <span class="k">class</span>="nu">320</span>   (recall <span <span class="k">class</span>="nu">89.9</span>%)       |   ╱ ╭─╯                                      U │      │   <span <span class="k">class</span>="nu">0.4</span> |  ╱╭─╯          full model adds D1 mobility   A └──────┴─────────────────       | ╱╭╯            regularity + D5 device health   Precision <span <span class="k">class</span>="nu">59.0</span>% · Recall <span <span class="k">class</span>="nu">89.9</span>% · at <span <span class="k">class</span>="nu">0.5</span>% FPR   <span <span class="k">class</span>="nu">0.2</span> |╱╯              → AUC <span <span class="k">class</span>="nu">0.883</span> → <span <span class="k">class</span>="nu">0.947</span>            Single-domain (D4-only) recall at same FPR: <span <span class="k">class</span>="nu">71.2</span>%       |╯                                              Cross-domain uplift: +<span <span class="k">class</span>="nu">18.7</span> pts recall   <span <span class="k">class</span>="nu">0.0</span> +──────────────────────────  FPR                (this delta is the flywheel, <span class="k">in</span> one model)      <span <span class="k">class</span>="nu">0.0</span>        <span <span class="k">class</span>="nu">0.5</span>        <span <span class="k">class</span>="nu">1.0</span>'}},children:[]},"D6.d3.m3":{id:"D6.d3.m3",level:4,parent:"D6.d3",path:["Kepler — The Flywheel Decade","Data & AI Platform","The models: turning compounded breadth into decisions that move D, L, and T","A feature pipeline that any domain can extend but not fork"],title:"Mechanism 3.3 — A feature pipeline that any domain can extend but not fork",body:'<p>A model is only as trustworthy as the features feeding it, so the feature pipeline is not a convenience script — it is versioned, shared code <button class="cite" data-cite="S-092">S-092</button>. A domain adds a feature by contributing a transform into that shared pipeline, which enforces point-in-time correctness and train/serve parity on the way in; what it cannot do is fork a private copy and let it drift <button class="cite" data-cite="S-092">S-092</button>. The pipeline shown here computes the cross-domain `road_roughness` feature that three separate domains consume off a single definition <button class="cite" data-cite="S-605">S-605</button>. Authored once, read three times — and the quality gate on `sensor_health` is the D5 coupling made executable, refusing bad device telemetry before it can poison a downstream decision <button class="cite" data-cite="S-092">S-092</button>. That is the discipline that keeps the registry in Mechanism 3.1 honest: extension is open, forking is closed, so breadth accumulates into one trusted surface instead of fragmenting into private copies that quietly disagree. Driver 3 has turned breadth into decisions; Driver 4 is why those decisions stay defensible across a decade <button class="cite" data-cite="S-092">S-092</button>.</p>',component:{family:"code",data:{file:"A feature pipeline that any domain can extend ",lines:'<span class="c"># feature: road_roughness  (S-605, S-612) — joins D1 traces + D5 telemetry + D3 courier GPS@feature(store="feat_location", grain="geohash7x15min", pit=True)  # point-in-time enforceddef road_roughness(ctx):    d1 = ctx.stream("D1.ride")   .select("geohash7", "t", "speed_var")    d5 = ctx.stream("D5.device") .select("geohash7", "t", "accel_rms", "sensor_health")    d3 = ctx.stream("D3.courier").select("geohash7", "t", "gps_jitter")    j  = pit_join([d1, d5, d3], on=["geohash7", "t"], window="15min")   # no leakage    j  = j.filter(col("sensor_health") &gt; 0.8)                           # D5 quality gate    rough = (0.5*z(j.accel_rms) + 0.3*z(j.speed_var) + 0.2*z(j.gps_jitter))    return rough.clip(-4, 4).alias("road_roughness")   # served to D1 routing, D2 siting, D3 ETA</span>'}},children:[]},"D6.d4":{id:"D6.d4",level:3,parent:"D6",path:["Kepler — The Flywheel Decade","Data & AI Platform","The moat compounding: the M identity made real, and made uncatchable"],title:"Driver 4 — The moat compounding: the M identity made real, and made uncatchable",body:'<p>The final driver is the thesis itself, folded back on the machinery that precedes it. Drivers 1 through 3 do work you can point at — they build the pipes, compound the breadth, and serve the models. Driver 4 does something different: it states <strong>why the result is a moat rather than a mere collection of capabilities</strong> — an advantage that widens as Kepler runs rather than eroding — and it discharges that claim by tying every term of the moat identity M = D × B × L × T back to a specific mechanism developed above <button class="cite" data-cite="S-093">S-093</button>. Nothing here is new evidence; it is the accounting that shows the earlier evidence multiplies.</p>',children:["D6.d4.m1","D6.d4.m2","D6.d4.m3"]},"D6.d4.m1":{id:"D6.d4.m1",level:4,parent:"D6.d4",path:["Kepler — The Flywheel Decade","Data & AI Platform","The moat compounding: the M identity made real, and made uncatchable","Each term of M is moved by a named mechanism, and D6 multiplies them"],title:"Mechanism 4.1 — Each term of M is moved by a named mechanism, and D6 multiplies them",body:'<p>M is a product, and Domain 6 is where the multiplication physically happens. The accounting is exact: for each of the four terms, name which mechanism above moves it, which cross-feed carries the lift, and the trajectory it is on <button class="cite" data-cite="S-094">S-094</button>. That per-term ledger is the point — the moat is not asserted, it is reconciled line by line to work already shown.</p><p>The consequence is mathematical, not rhetorical. Because M is multiplicative, moving breadth <strong>B by 2.4× while the other three terms rise 1.5–1.9× does not add — it multiplies</strong>, so M compounds far faster than any single term improves <button class="cite" data-cite="S-613">S-613</button>. This is the arithmetic core of "one flywheel, not six": a conglomerate stacks P&amp;Ls and grows linearly; the flywheel multiplies moat terms and grows super-linearly. And the multiplication is not an accident of branding — Domain 6 is the only layer where the terms meet on shared features and actually compose, rather than sitting in six separate warehouses being added <button class="cite" data-cite="S-613">S-613</button>.</p>',component:{family:"faceted-grid",data:{cols:["Term","What D6 does to it","Mechanism (trace)","Cross-feed","Today → 10y"],rows:[["D density","Routing/safety models cut deadhead, raise trips/vehicle-hr","3.1, served via 1.3 (S-609)","serves D1; fed by D1 traces","index 100 → 168"],["B breadth","Feature store + cross-joins; +19% join-only value","1.2, 2.1 (S-603, S-605)","fed by D5 sensors, D1 loc","100 → 240"],["L liquidity","Matching model raises fill rate & courier supply-z","3.1 (S-609)","serves D3; fed by D3 supply","100 → 155"],["T trust","Fraud/credit model: recall 71→90% at fixed FPR","3.2 (S-610)","serves D4; fed by D4 signals","100 → 190"]],negCols:[]}},children:[]},"D6.d4.m2":{id:"D6.d4.m2",level:4,parent:"D6.d4",path:["Kepler — The Flywheel Decade","Data & AI Platform","The moat compounding: the M identity made real, and made uncatchable","The moat widens with scale, so sequencing beats focus"],title:"Mechanism 4.2 — The moat widens with scale, so sequencing beats focus",body:`<p>The moat does not merely persist at scale — it widens, and that single property is what turns sequencing from housekeeping into strategy. The cross-join uplift is a function of how many streams share a key: the <strong>Sankey's +19% and the ROC's +18.7 points grow every time a domain is sequenced onto the platform</strong> <button class="cite" data-cite="S-614">S-614</button>. This is precisely the asymmetry the bear case cannot see. A focused specialist adding users gets more of the same data along one axis; Kepler adding a domain gets a new dimension that multiplies against every dimension already present. Breadth term B therefore has increasing returns.</p><p>That is the edge case the bears miss. At small scale the conglomerate discount is correct — six mediocre verticals, each trailing a specialist, honestly worth less summed than a break-up would unlock. But increasing returns on B guarantee a crossover: a scale beyond which the flywheel dominates focus and the discount inverts into a premium. <strong>Sequencing is choosing when to cross that line</strong> <button class="cite" data-cite="S-614">S-614</button>.</p><p>And the order is not free. Breadth-heavy domains — D5 devices, D1 mobility — must land before the models that monetise them, D4 credit and D3 matching, or the models train on thin data and the compounding stalls before it starts <button class="cite" data-cite="S-615">S-615</button>. The platform is the reason the sequence has a right answer at all: only a shared substrate makes "build breadth first, monetise second" a physical constraint rather than a preference.</p>`,children:[]},"D6.d4.m3":{id:"D6.d4.m3",level:4,parent:"D6.d4",path:["Kepler — The Flywheel Decade","Data & AI Platform","The moat compounding: the M identity made real, and made uncatchable","The cost centre is the moat's price, and it is falling per unit of M"],title:"Mechanism 4.3 — The cost centre is the moat's price, and it is falling per unit of M",body:`<p>The cost centre is not a wound; it is the moat's price tag, and it is falling per unit of M. <strong>Domain 6's −420m is the amortising fixed cost of the multiplier</strong> — the shared substrate that lifts blended contribution per interaction from −0.31 across all six domains at once <button class="cite" data-cite="S-616">S-616</button>. The divide between the two readings is entirely accounting posture: the bears expense the hub as a standing loss, while the thesis capitalises it as the asset whose returns show up in every other domain's margin <button class="cite" data-cite="S-616">S-616</button>. As M compounds, the same −420m buys more moat, so the cost per unit of advantage declines even as the headline figure holds.</p>`,children:[]}},roots:["D1","D2","D3","D4","D5","D6"]},gn=ot.nodes,xm=["overview",...ot.roots];function q1({html:e}){return e?v.jsx("div",{className:"prose-illum max-w-[74ch]",dangerouslySetInnerHTML:{__html:e}}):null}function W1({node:e}){return e.component?v.jsx(km,{spec:e.component}):null}function Ac({node:e}){return v.jsxs("div",{"data-node-body":e.id,"data-level":e.level,children:[v.jsx(q1,{html:e.body}),v.jsx(W1,{node:e})]})}function G1({node:e}){return v.jsx(Ac,{node:e})}function Y1({node:e}){const t=e.children.map(n=>gn[n]).filter(Boolean);return v.jsxs(v.Fragment,{children:[v.jsx(Ac,{node:e}),t.length>0&&v.jsx(vf,{items:t.map(n=>({value:n.id,header:v.jsx("span",{className:"text-[.9rem] font-bold text-ink",children:n.title}),body:v.jsx(G1,{node:n})}))})]})}function Q1({node:e}){const t=e.children.map(r=>gn[r]).filter(Boolean),n=ot.roots.indexOf(e.id)+1;return v.jsxs("div",{className:"grid grid-cols-[clamp(48px,6vw,90px)_1fr] gap-x-6 lg:gap-x-10",children:[v.jsxs("div",{children:[v.jsx("div",{className:"font-ft font-bold text-[clamp(2.4rem,5vw,4.4rem)] leading-[.8] tracking-tighter text-ink",children:String(n).padStart(2,"0")}),v.jsx("div",{className:"font-ft font-bold text-[.56rem] tracking-[.12em] uppercase text-ink-3 mt-2",children:e.path[e.path.length-1]})]}),v.jsxs("div",{className:"min-w-0",children:[v.jsxs("div",{className:"font-ft font-bold text-[.7rem] tracking-[.14em] uppercase text-ink-2 flex items-center gap-3",children:[v.jsx("span",{children:e.path.join(" · ")}),v.jsx("span",{className:"flex-1 h-px bg-rule-hi max-w-[220px]"})]}),v.jsx("h2",{className:"text-[clamp(1.5rem,3vw,2.2rem)] font-bold tracking-tight text-ink mt-3 max-w-[26ch]",children:e.title}),v.jsx(Ac,{node:e}),v.jsxs("div",{className:"flex items-baseline gap-2.5 flex-wrap mb-2 pb-2 border-b border-rule mt-9",children:[v.jsx("span",{className:"font-ft font-bold text-[.62rem] track
